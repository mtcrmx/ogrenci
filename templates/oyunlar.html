<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oyun Merkezi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pop { from { opacity:0; transform:scale(.96) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    .pop { animation: pop .25s ease both; }
    .answer-btn:disabled, .game-btn:disabled { cursor: default; opacity: .72; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 overflow-x-hidden">
  <main class="max-w-6xl mx-auto px-4 py-5 space-y-5">
    <header class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3">
      <div class="min-w-0">
        <p class="text-xs font-black uppercase tracking-widest text-blue-300">Quiz soru bankası ile</p>
        <h1 class="text-2xl font-black">Oyun Merkezi</h1>
        <p class="text-sm text-slate-400">{{ sinif_adi }} · Sorular ders havuzundan karışık gelir, her soruda tek cevap hakkı vardır.</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <select id="dersSec" class="rounded-xl bg-slate-900 border border-slate-700 px-3 py-2 text-xs font-bold text-slate-100">
          <option value="">Karışık dersler</option>
          {% for ders in quiz_dersler %}
          <option value="{{ ders }}">{{ ders_emoji.get(ders, "📘") }} {{ ders }}</option>
          {% endfor %}
        </select>
        <button onclick="soruHavuzuYukle(true)" class="rounded-xl bg-blue-700 hover:bg-blue-600 px-3 py-2 text-xs font-black">Soruları Yenile</button>
        <a href="{{ url_for('ogrenci_gelisim_panel') }}" class="rounded-xl bg-slate-700 px-3 py-2 text-xs font-bold">XP Panel</a>
        <a href="{{ url_for('ogrenci_gorunum') }}" class="rounded-xl bg-slate-800 px-3 py-2 text-xs font-bold">Tik geçmişi</a>
        <a href="{{ url_for('ogrenci_mac_panel') }}" class="rounded-xl bg-green-700 px-3 py-2 text-xs font-bold">Mac/Taktik</a>
      </div>
    </header>

    <section class="grid md:grid-cols-4 gap-3">
      <button onclick="oyunAc('quiz')" class="pop rounded-2xl bg-blue-600/20 border border-blue-500/30 p-4 text-left hover:bg-blue-600/30">
        <div class="text-3xl">⚡</div><div class="font-black mt-2">Hızlı Quiz</div><p class="text-xs text-blue-200">Tek cevap, sonra yeni soru</p>
      </button>
      <button onclick="oyunAc('kelime')" class="pop rounded-2xl bg-emerald-600/20 border border-emerald-500/30 p-4 text-left hover:bg-emerald-600/30" style="animation-delay:.06s">
        <div class="text-3xl">🧩</div><div class="font-black mt-2">Kelime Avı</div><p class="text-xs text-emerald-200">Doğru cevabı harflerden çöz</p>
      </button>
      <button onclick="oyunAc('eslestir')" class="pop rounded-2xl bg-amber-600/20 border border-amber-500/30 p-4 text-left hover:bg-amber-600/30" style="animation-delay:.12s">
        <div class="text-3xl">🔗</div><div class="font-black mt-2">Eşleştirme</div><p class="text-xs text-amber-200">Soru ve cevabı eşleştir</p>
      </button>
      <button onclick="oyunAc('hafiza')" class="pop rounded-2xl bg-purple-600/20 border border-purple-500/30 p-4 text-left hover:bg-purple-600/30" style="animation-delay:.18s">
        <div class="text-3xl">🃏</div><div class="font-black mt-2">Hafıza Kartları</div><p class="text-xs text-purple-200">Quiz cevap çiftlerini bul</p>
      </button>
    </section>

    <section class="rounded-3xl bg-slate-900 border border-slate-800 p-5 min-h-[420px]">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
        <div>
          <h2 id="baslik" class="font-black text-xl">Bir oyun seç</h2>
          <p id="altBilgi" class="text-xs text-slate-500 mt-1">Soru havuzu hazırlanıyor.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <div class="rounded-full bg-slate-950 border border-slate-800 px-4 py-1 text-sm font-black">
            Puan: <span id="puan">0</span>
          </div>
          <div class="rounded-full bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 px-4 py-1 text-sm font-black">
            XP: <span id="xpKazanc">0</span>
          </div>
        </div>
      </div>
      <div id="sonuc" class="hidden mb-3 rounded-xl px-4 py-2 text-sm font-bold"></div>
      <div id="alan" class="text-slate-400 break-words">Üstteki oyun kartlarından birini seçerek başla.</div>
    </section>
  </main>

<script>
const SINIF_SEVIYESI = {{ sinif_seviyesi }};
let puan = 0;
let aktifOyun = 'quiz';
let soruHavuzu = [];
let kullanilanSorular = new Set();
let turKilitli = false;
let secilen = [];
let acik = [];
let eslesmeCiftleri = [];

document.getElementById('dersSec').addEventListener('change', () => soruHavuzuYukle(true));

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function karistir(arr) { return [...arr].sort(() => Math.random() - .5); }

async function soruHavuzuYukle(oyunuYenile = false) {
  const ders = document.getElementById('dersSec').value;
  const url = `/api/oyun/quiz-sorular?adet=60${ders ? '&ders=' + encodeURIComponent(ders) : ''}`;
  document.getElementById('altBilgi').textContent = 'Soru havuzu yükleniyor...';
  const res = await fetch(url);
  const data = await res.json();
  if (!data.ok || !data.sorular?.length) {
    soruHavuzu = [];
    document.getElementById('alan').innerHTML = '<div class="rounded-xl bg-red-500/10 border border-red-500/30 p-4 text-red-200 font-bold">Bu ders için soru bulunamadı.</div>';
    return;
  }
  soruHavuzu = data.sorular;
  kullanilanSorular = new Set();
  document.getElementById('altBilgi').textContent = `${soruHavuzu.length} soru hazır · ${SINIF_SEVIYESI}. sınıf havuzu`;
  if (oyunuYenile) oyunAc(aktifOyun);
}

function soruSec() {
  if (!soruHavuzu.length) return null;
  let adaylar = soruHavuzu.filter(s => !kullanilanSorular.has(s.id));
  if (!adaylar.length) {
    kullanilanSorular = new Set();
    adaylar = soruHavuzu;
  }
  const q = adaylar[Math.floor(Math.random() * adaylar.length)];
  kullanilanSorular.add(q.id);
  return q;
}

function dogruSecenek(q) {
  return (q.secenekler || []).find(s => s.harf === q.dogru) || {harf:q.dogru, metin:q.dogru_metin};
}

function puanEkle(n) {
  puan = Math.max(0, puan + n);
  document.getElementById('puan').textContent = puan;
  if (n > 0) oyunPuaniKaydet(aktifOyun, n);
}

async function oyunPuaniKaydet(oyun, oyunPuani) {
  try {
    const res = await fetch('{{ url_for("oyun_puan_api") }}', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({oyun, puan: oyunPuani})
    });
    const data = await res.json();
    const box = document.getElementById('sonuc');
    if (!data.ok) throw new Error(data.sebep || 'Puan kaydedilemedi');
    document.getElementById('xpKazanc').textContent = data.xp;
    box.className = 'mb-3 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-emerald-200 px-4 py-2 text-sm font-bold';
    let m = data.xp > 0 ? `+${data.xp} XP kaydedildi.` : 'Puan kaydedildi. Günlük oyun XP limiti doldu.';
    if (data.xp > 0 && data.sinifa_lig_katkisi) m += ' Sınıf Süper Lig puanına +1 katkı aldı.';
    box.textContent = m;
    box.classList.remove('hidden');
  } catch (e) {
    const box = document.getElementById('sonuc');
    box.className = 'mb-3 rounded-xl bg-red-500/10 border border-red-500/30 text-red-200 px-4 py-2 text-sm font-bold';
    box.textContent = e.message;
    box.classList.remove('hidden');
  }
}

async function oyunAc(tur) {
  aktifOyun = tur;
  if (!soruHavuzu.length) await soruHavuzuYukle(false);
  if (tur === 'quiz') hizliSoru();
  if (tur === 'kelime') kelimeOyunu();
  if (tur === 'eslestir') eslestirme();
  if (tur === 'hafiza') hafiza();
}

function hizliSoru() {
  const q = soruSec();
  if (!q) return;
  turKilitli = false;
  document.getElementById('baslik').textContent = '⚡ Hızlı Quiz';
  document.getElementById('alan').innerHTML = `
    <div class="pop space-y-4">
      <div class="flex items-center justify-between gap-2 text-xs text-slate-500">
        <span class="rounded-full bg-blue-500/10 border border-blue-500/20 px-3 py-1">${escapeHtml(q.ders)}</span>
        <span>Tek cevap hakkı</span>
      </div>
      <div class="text-xl sm:text-2xl font-black text-white">${escapeHtml(q.soru)}</div>
      <div class="grid md:grid-cols-2 gap-3">
        ${q.secenekler.map(s => `
          <button data-harf="${s.harf}" onclick="cevaplaQuiz(this, ${JSON.stringify(q.dogru)})"
                  class="answer-btn rounded-2xl bg-slate-950 border border-slate-800 p-4 font-bold text-left hover:bg-blue-600/20">
            <span class="text-blue-300 font-black">${s.harf}</span> · ${escapeHtml(s.metin)}
          </button>`).join('')}
      </div>
    </div>`;
}

function cevaplaQuiz(btn, dogru) {
  if (turKilitli) return;
  turKilitli = true;
  document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
  const ok = btn.dataset.harf === dogru;
  btn.classList.add(ok ? 'bg-emerald-700/50' : 'bg-red-700/50');
  document.querySelectorAll('.answer-btn').forEach(b => {
    if (b.dataset.harf === dogru) b.classList.add('ring-2', 'ring-emerald-400');
  });
  puanEkle(ok ? 10 : -3);
  bildirim(ok ? 'Doğru! Yeni soru geliyor.' : 'Yanlış. Doğru cevap işaretlendi.', ok);
  setTimeout(hizliSoru, 1000);
}

function kelimeOyunu() {
  const q = soruSec();
  if (!q) return;
  turKilitli = false;
  const dogru = dogruSecenek(q).metin || q.dogru_metin || '';
  const harfler = karistir(dogru.toLocaleUpperCase('tr-TR').replace(/[^A-ZÇĞİÖŞÜ]/g, '').split('')).join(' ');
  document.getElementById('baslik').textContent = '🧩 Kelime Avı';
  document.getElementById('alan').innerHTML = `
    <div class="pop space-y-4">
      <div class="text-sm text-slate-400">İpucu: ${escapeHtml(q.soru)}</div>
      <div class="text-2xl sm:text-4xl font-black tracking-widest text-emerald-300 break-words">${escapeHtml(harfler)}</div>
      <input id="kelimeCevap" class="w-full rounded-xl bg-slate-950 border border-slate-800 px-4 py-3 text-white" placeholder="Cevabı yaz">
      <button id="kelimeBtn" onclick="kelimeKontrol(${JSON.stringify(dogru)})" class="game-btn rounded-xl bg-emerald-600 px-4 py-2 font-black">Kontrol Et</button>
    </div>`;
}

function kelimeKontrol(dogru) {
  if (turKilitli) return;
  turKilitli = true;
  document.getElementById('kelimeBtn').disabled = true;
  const v = document.getElementById('kelimeCevap').value.trim().toLocaleUpperCase('tr-TR');
  const d = String(dogru).trim().toLocaleUpperCase('tr-TR');
  const ok = v === d;
  puanEkle(ok ? 12 : -2);
  bildirim(ok ? 'Harika, doğru! Yeni kelime geliyor.' : 'Doğru cevap: ' + dogru, ok);
  setTimeout(kelimeOyunu, 1100);
}

function eslestirme() {
  document.getElementById('baslik').textContent = '🔗 Eşleştirme';
  secilen = [];
  eslesmeCiftleri = [];
  const secilenSorular = karistir(soruHavuzu).slice(0, Math.min(4, soruHavuzu.length));
  const sol = karistir(secilenSorular.map(q => ({tip:'soru', id:q.id, metin:q.soru})));
  const sag = karistir(secilenSorular.map(q => ({tip:'cevap', id:q.id, metin:dogruSecenek(q).metin})));
  document.getElementById('alan').innerHTML = `
    <div class="pop grid md:grid-cols-2 gap-4">
      <div class="space-y-2">${sol.map(x => esButon(x)).join('')}</div>
      <div class="space-y-2">${sag.map(x => esButon(x)).join('')}</div>
    </div>`;
}

function esButon(x) {
  return `<button data-id="${x.id}" data-tip="${x.tip}" onclick="esSec(this)"
          class="sec w-full rounded-xl bg-slate-950 border border-slate-800 px-4 py-3 text-left text-sm font-bold hover:bg-amber-600/20">${escapeHtml(x.metin)}</button>`;
}

function esSec(btn) {
  if (btn.disabled || secilen.includes(btn)) return;
  btn.classList.add('ring-2', 'ring-amber-400');
  secilen.push(btn);
  if (secilen.length !== 2) return;
  const [a, b] = secilen;
  const ok = a.dataset.id === b.dataset.id && a.dataset.tip !== b.dataset.tip;
  if (ok) {
    a.disabled = b.disabled = true;
    a.classList.add('bg-emerald-700/40');
    b.classList.add('bg-emerald-700/40');
    puanEkle(8);
    if (document.querySelectorAll('.sec:not(:disabled)').length === 0) setTimeout(eslestirme, 900);
  } else {
    puanEkle(-2);
    a.classList.add('bg-red-700/40');
    b.classList.add('bg-red-700/40');
    setTimeout(() => {
      a.classList.remove('ring-2', 'ring-amber-400', 'bg-red-700/40');
      b.classList.remove('ring-2', 'ring-amber-400', 'bg-red-700/40');
    }, 550);
  }
  secilen = [];
}

function hafiza() {
  document.getElementById('baslik').textContent = '🃏 Hafıza Kartları';
  acik = [];
  const secilenSorular = karistir(soruHavuzu).slice(0, Math.min(4, soruHavuzu.length));
  const kartlar = karistir(secilenSorular.flatMap(q => {
    const d = dogruSecenek(q).metin;
    return [{id:q.id, v:d}, {id:q.id, v:d}];
  }));
  document.getElementById('alan').innerHTML = `
    <div class="pop grid grid-cols-2 sm:grid-cols-4 gap-3">
      ${kartlar.map((k, i) => `<button data-id="${k.id}" data-v="${escapeHtml(k.v)}" onclick="kartCevir(this)"
        class="game-btn h-24 rounded-2xl bg-purple-600/20 border border-purple-500/30 text-lg font-black">?</button>`).join('')}
    </div>`;
}

function kartCevir(btn) {
  if (btn.dataset.ok || acik.includes(btn) || acik.length >= 2) return;
  btn.textContent = btn.dataset.v;
  acik.push(btn);
  if (acik.length !== 2) return;
  const ok = acik[0].dataset.id === acik[1].dataset.id && acik[0] !== acik[1];
  puanEkle(ok ? 6 : -1);
  setTimeout(() => {
    if (ok) {
      acik.forEach(b => { b.dataset.ok = '1'; b.disabled = true; b.classList.add('bg-emerald-600/40'); });
      if (document.querySelectorAll('.game-btn:not(:disabled)').length === 0) setTimeout(hafiza, 900);
    } else {
      acik.forEach(b => b.textContent = '?');
    }
    acik = [];
  }, 650);
}

function bildirim(metin, ok) {
  const box = document.getElementById('sonuc');
  box.className = `mb-3 rounded-xl ${ok ? 'bg-emerald-500/10 border border-emerald-500/30 text-emerald-200' : 'bg-red-500/10 border border-red-500/30 text-red-200'} px-4 py-2 text-sm font-bold`;
  box.textContent = metin;
  box.classList.remove('hidden');
}

soruHavuzuYukle(false);
</script>
</body>
</html>
