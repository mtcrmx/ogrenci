<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2D Voleybol Motoru (Pro)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
    #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    #header { height: 60px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid #333; }
    #score-board { font-size: 20px; font-weight: 900; letter-spacing: 1px; text-align: center; }
    #canvas-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
    canvas { background: #d97706; border: 20px solid #fbbf24; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 100%; max-height: 100%; }
    #event-overlay {
      position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px;
      font-weight: bold; font-size: 16px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="game-container">
  <div id="header">
    <div class="text-blue-400 font-bold text-sm w-1/3" id="team1-name">Bizim Sınıf</div>
    <div id="score-board" class="w-1/3">
       <div class="text-xs text-amber-400">SET <span id="set1">0</span> - <span id="set2">0</span></div>
       <div class="text-lg"><span id="score1">0</span> - <span id="score2">0</span></div>
    </div>
    <div class="text-red-400 font-bold text-sm w-1/3 text-right" id="team2-name">Rakip Sınıf</div>
    <button onclick="window.close()" class="absolute right-4 top-14 mt-2 px-3 py-1 bg-red-600 rounded text-xs font-bold hover:bg-red-500 z-50 hidden" id="close-btn">Kapat</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="pitch"></canvas>
    <div id="event-overlay">Maç Başlıyor!</div>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const rakip_id = urlParams.get('rakip_id');

const FPS = 60;
const GAME_WIDTH = 450;
const GAME_HEIGHT = 900;

// === PHYSICS CONSTANTS ===
const GRAVITY = 0.18;           // 9.81 m/s² scaled (~0.18 px/frame²)
const AIR_DRAG = 0.003;         // Air resistance coefficient
const FLOOR_RESTITUTION = 0.85; // 15% energy loss on floor bounce
const NET_RESTITUTION = 0.4;    // 60% energy loss on net collision
const NET_TOP_Z = 18;           // Net height in Z units

let isPlaying = false;
let score1 = 0, score2 = 0;
let set1 = 0, set2 = 0;
let stateMachine = "SERVIS"; // SERVIS, PLAYING, POINT_CELEBRATION, MATCH_END
let serverTeam = null;

const canvas = document.getElementById('pitch');
const ctx = canvas.getContext('2d');
canvas.width = GAME_WIDTH;
canvas.height = GAME_HEIGHT;

let team1 = null;
let team2 = null;
let players = [];
let ball = { x: GAME_WIDTH/2, y: GAME_HEIGHT/2, z: 0, vx: 0, vy: 0, vz: 0,
    spinX: 0, spinY: 0, // Magnus spin components
    owner: null, lastTouchedBy: null, lastTeamTouched: null };
let teamTouches = 0;
let goalTimer = 0;
let eventTimeout = null;
let servisOyuncuIndex = 0; // rotates each set
let lastNetSide = null; // track net crossing properly

function showEvent(msg, duration=2000) {
    const el = document.getElementById('event-overlay');
    el.innerHTML = msg;
    el.style.opacity = 1;
    clearTimeout(eventTimeout);
    if(duration > 0) eventTimeout = setTimeout(() => el.style.opacity = 0, duration);
}

const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const normalize = (dx, dy) => {
    const len = Math.hypot(dx, dy);
    if (len === 0) return {x:0, y:0};
    return {x: dx/len, y: dy/len};
};

async function loadData() {
  try {
    const res = await fetch("{{ url_for('api_ogrenci_mac_2d_data') }}", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ rakip_sinif_id: parseInt(rakip_id), spor: "voleybol" })
    });
    const data = await res.json();
    if (!data.ok) return;
    
    document.getElementById('team1-name').textContent = data.bizim_takim.ad;
    document.getElementById('team2-name').textContent = data.rakip_takim.ad;
    team1 = { name: data.bizim_takim.ad, color: '#3b82f6', dirY: -1, defendY: GAME_HEIGHT, side: 1 };
    team2 = { name: data.rakip_takim.ad, color: '#ef4444', dirY: 1, defendY: 0, side: 2 };
    serverTeam = team1;
    
    data.bizim_takim.oyuncular.forEach(p => addPlayer(p, team1, false));
    data.rakip_takim.oyuncular.forEach(p => addPlayer(p, team2, true));
    
    resetPositions();
    showEvent("Voleybol Maçı Başlıyor!", 3000);
    isPlaying = true;
    requestAnimationFrame(gameLoop);
  } catch(e) {
    console.error(e);
  }
}

function addPlayer(p, team, mirror) {
    let tx = (p.baseX / 100) * GAME_WIDTH;
    let ty = (p.baseY / 100) * GAME_HEIGHT;
    if (mirror) { tx = GAME_WIDTH - tx; ty = GAME_HEIGHT - ty; }
    let isLibero = (p.rol && p.rol.toLowerCase().includes('libero')) || players.filter(pl => pl.team === team).length === 5; // make 6th player libero if none specified
    players.push({
        id: p.id, ad: p.ad, numara: p.numara, ovr: p.ovr, team: team,
        ozellikler: p.ozellikler || {hiz: p.ovr, sut: p.ovr, pas: p.ovr, defans: p.ovr, kaleci: p.ovr},
        baseX: tx, baseY: ty, x: tx, y: ty, vx: 0, vy: 0,
        actionCooldown: 0,
        isLibero: isLibero
    });
}

const VOLLEYBALL_ZONES = [
    {x: 0.8, y: 0.7, row: 'back'},   // Zone 1: Back Right (Server)
    {x: 0.5, y: 0.7, row: 'back'},   // Zone 6: Back Center
    {x: 0.2, y: 0.7, row: 'back'},   // Zone 5: Back Left
    {x: 0.2, y: 0.3, row: 'front'},  // Zone 4: Front Left
    {x: 0.5, y: 0.3, row: 'front'},  // Zone 3: Front Center
    {x: 0.8, y: 0.3, row: 'front'}   // Zone 2: Front Right
];

function resetPositions() {
    [team1, team2].forEach(team => {
        const teamPlayers = players.filter(p => p.team === team);
        teamPlayers.forEach((p, i) => {
            // Calculate rotational position
            const rotIdx = team.rotationIndex || 0;
            const currentZoneIdx = (i + rotIdx) % 6;
            const zone = VOLLEYBALL_ZONES[currentZoneIdx];
            
            p.currentRow = zone.row; // 'front' or 'back'
            p.currentZone = currentZoneIdx; // 0 is Server (Zone 1)
            
            // Mirror X for opponent side to align correctly? 
            // Standard: Zone 1 is always back right from team's perspective.
            let px = zone.x;
            if (team.side === 2) px = 1 - px; // mirror X for top team so 'right' is their right
            
            p.baseX = px * GAME_WIDTH;
            p.baseY = team.side === 1 
                ? GAME_HEIGHT/2 + zone.y * (GAME_HEIGHT/2)
                : GAME_HEIGHT/2 - zone.y * (GAME_HEIGHT/2);
                
            p.x = p.baseX; p.y = p.baseY; 
            p.vx = 0; p.vy = 0; p.actionCooldown = 0;
        });
    });

    ball.vx = 0; ball.vy = 0; ball.vz = 0; ball.spinX = 0; ball.spinY = 0; ball.owner = null;
    teamTouches = 0; ball.lastTeamTouched = null;
    
    if (stateMachine !== "MATCH_END") {
        stateMachine = "SERVIS";
        
        // Server is always the player in Zone 1 (currentZoneIdx === 0), but Libero cannot serve
        const servingTeamPlayers = players.filter(p => p.team === serverTeam);
        let server = servingTeamPlayers.find(p => p.currentZone === 0) || servingTeamPlayers[0];
        if (server.isLibero) {
            // Pick another player to serve instead of Libero
            server = servingTeamPlayers.find(p => p.currentZone === 1) || servingTeamPlayers[1];
        }
        
        // Move server to service line
        server.x = serverTeam.side === 1 ? GAME_WIDTH - 40 : 40;
        server.y = serverTeam.side === 1 ? GAME_HEIGHT - 20 : 20;
        ball.x = server.x; ball.y = server.y; ball.z = 10;
        ball.owner = server;
        server.actionCooldown = 60; // delay
        lastNetSide = serverTeam;
    }
}

function givePoint(team, reason) {
    stateMachine = "POINT_CELEBRATION";
    goalTimer = 120;
    showEvent(reason + "<br>Sayı: " + team.name, 2000);
    
    if (team === team1) score1++; else score2++;
    document.getElementById('score1').textContent = score1;
    document.getElementById('score2').textContent = score2;
    
    // Rotation: only rotate if we won the serve back (Side-out)
    if (serverTeam !== team) {
        team.rotationIndex = ((team.rotationIndex || 0) + 1) % 6;
    }
    serverTeam = team;
    
    // Check set win (Set 5 is up to 15, others up to 25. Must win by 2)
    let pointsToWin = (set1 + set2 === 4) ? 15 : 25;
    
    if ((score1 >= pointsToWin || score2 >= pointsToWin) && Math.abs(score1 - score2) >= 2) {
        if (score1 > score2) set1++; else set2++;
        document.getElementById('set1').textContent = set1;
        document.getElementById('set2').textContent = set2;
        score1 = 0; score2 = 0;
        document.getElementById('score1').textContent = score1;
        document.getElementById('score2').textContent = score2;
        
        if (set1 === 3 || set2 === 3) {
            stateMachine = "MATCH_END";
            showEvent(`MAÇ BİTTİ!<br>Kazanan: ${set1===3 ? team1.name : team2.name}`, -1);
            autoSubmit();
        } else {
            showEvent(`SET BİTTİ!<br>${team.name} Seti Kazandı!`, 3000);
            goalTimer = 180;
            // Switch sides
            [team1.side, team2.side] = [team2.side, team1.side];
        }
    }
}

function autoSubmit() {
    document.getElementById('close-btn').style.display = 'block';
    if(window.opener && !window.opener.closed) {
        const form = window.opener.document.querySelector('form[action*="voleybol"]') || window.opener.document.forms[1];
        if (form) {
            const in1 = form.querySelector('input[name="skor1"]');
            const in2 = form.querySelector('input[name="skor2"]');
            if(in1) in1.value = set1;
            if(in2) in2.value = set2;
            showEvent("Sonuç öğretmene başarıyla gönderildi!", -1);
            form.submit();
        }
    }
}

function update() {
    if (!isPlaying || stateMachine === "MATCH_END") return;

    if (stateMachine === "POINT_CELEBRATION") {
        goalTimer--;
        if (goalTimer <= 0) resetPositions();
        return;
    }

    if (stateMachine === "SERVIS") {
        if (ball.owner) {
            let p = ball.owner;
            if (p.actionCooldown > 0) { p.actionCooldown--; return; }
            
            // Servis mutlaka rakip yarı sahayı hedefler; hata sadece hedefin yerini bozar.
            const errMargin = (100 - p.ozellikler.sut) / 100;
            const errX = (Math.random() * 70 - 35) * errMargin;
            const errY = (Math.random() * 55 - 25) * errMargin;
            const courtMargin = 70;
            const gX = Math.max(courtMargin, Math.min(GAME_WIDTH - courtMargin,
                courtMargin + Math.random() * (GAME_WIDTH - courtMargin * 2) + errX));
            const targetTop = p.team === team1;
            const gY = targetTop
                ? Math.max(80, Math.min(GAME_HEIGHT / 2 - 70, 175 + errY))
                : Math.max(GAME_HEIGHT / 2 + 70, Math.min(GAME_HEIGHT - 80, GAME_HEIGHT - 175 + errY));
            
            const dir = normalize(gX - p.x, gY - p.y);
            const d = dist(p, {x:gX, y:gY});
            
            ball.vz = 12 + Math.random() * 2.5;
            const airTime = Math.max(46, Math.min(72, d / 7.4));
            const power = Math.max(5.5, d / airTime);
            
            ball.vx = dir.x * power;
            ball.vy = dir.y * power;
            if (targetTop && ball.vy > -5.2) ball.vy = -5.2;
            if (!targetTop && ball.vy < 5.2) ball.vy = 5.2;
            // Magnus spin: float serve vs jump serve
            ball.spinX = (Math.random() - 0.5) * 0.08 * (1 - errMargin);
            ball.spinY = (Math.random() - 0.5) * 0.05 * (1 - errMargin);
            
            ball.owner = null;
            ball.lastTouchedBy = null; // Reset so server can receive return
            ball.lastTeamTouched = p.team;
            lastNetSide = p.team;
            teamTouches = 0;
            stateMachine = "PLAYING";
            showEvent("Servis!", 600);
        }
        return;
    }

    // ========== ADVANCED BALL PHYSICS ==========
    // Gravity (9.81 m/s² scaled to game units: ~0.18 px/frame²)
    ball.vz -= GRAVITY;
    
    // Air drag (proportional to speed²)
    const speed2D = Math.hypot(ball.vx, ball.vy);
    if (speed2D > 0.1) {
        const dragForce = AIR_DRAG * speed2D * speed2D;
        const dragRatio = Math.max(0, 1 - dragForce / speed2D);
        ball.vx *= dragRatio;
        ball.vy *= dragRatio;
    }
    // Vertical air drag
    if (Math.abs(ball.vz) > 0.1) {
        ball.vz *= (1 - AIR_DRAG * Math.abs(ball.vz) * 0.3);
    }
    
    // Magnus Effect (spin curves the ball in air)
    if (ball.z > 0) {
        ball.vx += (ball.spinX || 0);
        ball.vy += (ball.spinY || 0);
        // Spin decays over time
        ball.spinX = (ball.spinX || 0) * 0.98;
        ball.spinY = (ball.spinY || 0) * 0.98;
    }
    
    // Apply velocity
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.z += ball.vz;
    
    // ========== FLOOR COLLISION (with bounce) ==========
    if (ball.z <= 0) {
        ball.z = 0;
        const isOut = ball.x < 0 || ball.x > GAME_WIDTH || ball.y < 0 || ball.y > GAME_HEIGHT;
        
        if (isOut) {
            givePoint(ball.lastTeamTouched === team1 ? team2 : team1, "Top Dışarıda! (Aut)");
        } else {
            const hitSide = ball.y > GAME_HEIGHT/2 ? team1 : team2;
            givePoint(hitSide === team1 ? team2 : team1, "Top Yerde!");
        }
        return;
    }
    
    // ========== NET COLLISION (elastic barrier) ==========
    const NET_HEIGHT = 18; // net top edge in z
    const NET_Y = GAME_HEIGHT / 2;
    const prevY = ball.y - ball.vy;
    
    // Check if ball crossed net line this frame
    if ((prevY < NET_Y && ball.y >= NET_Y) || (prevY > NET_Y && ball.y <= NET_Y)) {
        if (ball.z < NET_HEIGHT) {
            // Ball hit the net!
            ball.vy = -ball.vy * NET_RESTITUTION; // bounce back with energy loss
            ball.vx *= NET_RESTITUTION;
            ball.vz = Math.max(ball.vz, -1) - 0.5; // net pushes ball down slightly
            ball.y = prevY; // push back to previous side
            ball.spinX = (ball.spinX || 0) * 0.3; // kill most spin
            ball.spinY = (ball.spinY || 0) * 0.3;
            showEvent("File!", 400);
        }
    }
    
    // ========== NET CROSSING TRACKING ==========
    const ballNetSide = ball.y > NET_Y ? team1 : team2;
    if (lastNetSide && ballNetSide !== lastNetSide && ball.z >= NET_HEIGHT) {
        teamTouches = 0;
        lastNetSide = ballNetSide;
        ball.lastTouchedBy = null; // Reset double-hit tracking on net crossing
    }

    // ========== PLAYER AI + HITBOX SYSTEM ==========
    players.forEach(p => {
        if (p.actionCooldown > 0) p.actionCooldown--;
        
        let targetX = p.baseX;
        let targetY = p.baseY;
        
        const ballOnMySide = p.team === team1 ? ball.y > NET_Y : ball.y < NET_Y;
        
        // Movement AI: predict ball landing spot
        if (ballOnMySide && ball.z > 0) {
            // Predict where ball will land
            let predX = ball.x, predY = ball.y, predVz = ball.vz;
            let predTime = 0;
            while (predVz > -20 && predTime < 120) { // max 2 seconds lookahead
                predVz -= GRAVITY;
                predX += ball.vx * (1 - AIR_DRAG * 0.5);
                predY += ball.vy * (1 - AIR_DRAG * 0.5);
                predTime++;
                if (predVz + predTime * -GRAVITY < 0) break; // ball descending
            }
            
            // Only closest 2 players chase
            let dToBall = dist(p, {x: predX, y: predY});
            let closerCount = 0;
            players.forEach(m => {
                if (m.team === p.team && m !== p && dist(m, {x:predX, y:predY}) < dToBall) closerCount++;
            });
            
            if (closerCount < 2) {
                targetX = predX;
                targetY = predY;
            }
        }
        
        // Movement physics
        const moveDir = normalize(targetX - p.x, targetY - p.y);
        const d = dist(p, {x:targetX, y:targetY});
        if (d > 5) {
            const speedMult = (p.ozellikler.hiz / 100) * 5.5;
            p.vx = moveDir.x * speedMult;
            p.vy = moveDir.y * speedMult;
        } else {
            p.vx *= 0.4; p.vy *= 0.4;
        }
        p.x += p.vx; p.y += p.vy;
        
        // Court boundaries (players can't cross net)
        p.x = Math.max(15, Math.min(GAME_WIDTH - 15, p.x));
        if (p.team === team1) {
            p.y = Math.max(NET_Y + 15, Math.min(GAME_HEIGHT - 15, p.y));
        } else {
            p.y = Math.max(15, Math.min(NET_Y - 15, p.y));
        }
        
        // ========== HITBOX & CONTACT DETECTION ==========
        const HITBOX_RADIUS = 22; // arm reach
        const hitDist = dist(p, ball);
        const zOK = ball.z > 0 && ball.z < 30; // reachable height
        
        if (ballOnMySide && zOK && hitDist < HITBOX_RADIUS && p.actionCooldown <= 0) {
            // === RULE: Double Hit ===
            if (ball.lastTouchedBy === p) {
                givePoint(p.team === team1 ? team2 : team1, "Çift Vuruş Hatası!");
                return;
            }
            // === RULE: 4th touch ===
            if (ball.lastTeamTouched === p.team && teamTouches >= 3) {
                givePoint(p.team === team1 ? team2 : team1, "4 Vuruş Hatası!");
                return;
            }
            
            ball.lastTouchedBy = p;
            ball.lastTeamTouched = p.team;
            teamTouches++;
            p.actionCooldown = 25;
            
            // === HIT TYPE SELECTION ===
            const errMargin = (100 - p.ozellikler.pas) / 100;
            
            // Contact angle affects output angle
            const contactAngle = Math.atan2(ball.y - p.y, ball.x - p.x);
            
            // Check if opponent is near net for BLOCK
            const nearNet = Math.abs(p.y - NET_Y) < 80;
            const isBlock = nearNet && ball.vz < 0 && ball.z > 12 &&
                ((p.team === team1 && ball.vy < 0) || (p.team === team2 && ball.vy > 0));
            
            if (isBlock && p.ozellikler.defans > 30) {
                // RULE: Libero cannot block
                if (p.isLibero) {
                    givePoint(p.team === team1 ? team2 : team1, "Libero Blok Hatası!");
                    return;
                }
                // === BLOCK: reverse velocity ===
                showEvent("BLOK! 🖐️", 600);
                const blockPower = 0.6 + (p.ozellikler.defans / 200);
                ball.vx = -ball.vx * blockPower + (Math.random() - 0.5) * 2;
                ball.vy = -ball.vy * blockPower;
                ball.vz = Math.abs(ball.vz) * 0.3 + 2;
                ball.spinX = 0; ball.spinY = 0;
                teamTouches--; // blocks don't count as team touch (FIVB rule)
                
            } else if (teamTouches === 1) {
                // === MANŞET (Dig/Bump): absorb speed, redirect up ===
                showEvent("Manşet!", 400);
                let setter = players.find(m => m.team === p.team && m !== p && Math.abs(m.baseY - NET_Y) < 120);
                if (!setter) setter = players.find(m => m.team === p.team && m !== p);
                
                const errX = (Math.random() * 80 - 40) * errMargin;
                const errY = (Math.random() * 80 - 40) * errMargin;
                const tgt = {x: setter.x + errX, y: setter.y + errY};
                const tgtDist = dist(p, tgt);
                const bDir = normalize(tgt.x - p.x, tgt.y - p.y);
                
                // Manşet absorbs incoming energy, sends high
                const incomingSpeed = Math.hypot(ball.vx, ball.vy, ball.vz);
                const absorbed = FLOOR_RESTITUTION; // energy absorption
                ball.vz = 9 + Math.random() * 3; // high pop-up
                const airT = (ball.vz / GRAVITY) * 2;
                const pw = Math.max(1.5, tgtDist / airT) * absorbed;
                ball.vx = bDir.x * pw;
                ball.vy = bDir.y * pw;
                ball.spinX = (Math.random() - 0.5) * 0.05; // minimal spin
                ball.spinY = (Math.random() - 0.5) * 0.05;
                
            } else if (teamTouches === 2) {
                // === PARMAK PAS (Finger Set): precise placement ===
                showEvent("Parmak Pas! 🤲", 400);
                let spiker = players.find(m => m.team === p.team && m !== p && Math.abs(m.baseY - NET_Y) < 100);
                if (!spiker) spiker = players.find(m => m.team === p.team && m !== p);
                
                // Parmak pas = very precise, low error
                const precisionBonus = 0.5; // halves error
                const errX = (Math.random() * 60 - 30) * errMargin * precisionBonus;
                const errY = (Math.random() * 60 - 30) * errMargin * precisionBonus;
                const tgt = {x: spiker.x + errX, y: spiker.y + errY};
                const tgtDist = dist(p, tgt);
                const bDir = normalize(tgt.x - p.x, tgt.y - p.y);
                
                // Set goes high and precise
                ball.vz = 10 + Math.random() * 3;
                const airT = (ball.vz / GRAVITY) * 2;
                const pw = Math.max(1.5, tgtDist / airT);
                ball.vx = bDir.x * pw;
                ball.vy = bDir.y * pw;
                ball.spinX = 0; ball.spinY = 0; // clean set
                
            } else {
                // === SMAÇ (Spike): high velocity + topspin ===
                // RULE: Back row attack violation (including Libero from anywhere)
                if (Math.abs(p.y - NET_Y) < 150) {
                    if (p.isLibero) {
                        givePoint(p.team === team1 ? team2 : team1, "Libero Hücum İhlali!");
                        return;
                    }
                    if (p.currentRow === 'back') {
                        givePoint(p.team === team1 ? team2 : team1, "Arka Hat Hücum İhlali (3 Metre)!");
                        return;
                    }
                }
                
                showEvent("SMAÇ! 💥", 600);
                const sutErr = (100 - p.ozellikler.sut) / 100;
                
                const margin = 40;
                const gX = margin + Math.random() * (GAME_WIDTH - margin * 2);
                const gY = p.team === team1
                    ? margin + Math.random() * (NET_Y - margin - 40)
                    : NET_Y + 40 + Math.random() * (GAME_HEIGHT - NET_Y - margin - 40);
                
                const errX = (Math.random() * 100 - 50) * sutErr;
                const errY = (Math.random() * 100 - 50) * sutErr;
                const tX = Math.max(5, Math.min(GAME_WIDTH - 5, gX + errX));
                const tY = Math.max(5, Math.min(GAME_HEIGHT - 5, gY + errY));
                
                const bDir = normalize(tX - p.x, tY - p.y);
                const tgtDist = dist(p, {x: tX, y: tY});
                
                // Spike: flat trajectory, fast
                ball.vz = 2 + Math.random() * 3;
                const airT = (ball.vz / GRAVITY) * 2;
                const pw = Math.max(3, tgtDist / airT);
                ball.vx = bDir.x * pw;
                ball.vy = bDir.y * pw;
                
                // Topspin (Magnus): ball curves downward
                ball.spinX = (Math.random() - 0.5) * 0.2;
                ball.spinY = (p.team === team1 ? -0.15 : 0.15) * (1 - sutErr); // topspin toward opponent
            }
        }
    });
}

function draw() {
    ctx.clearRect(0,0,GAME_WIDTH,GAME_HEIGHT);
    
    // Court floor
    ctx.fillStyle = '#c27803';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    // Court Lines
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.strokeRect(2, 2, GAME_WIDTH-4, GAME_HEIGHT-4); // outer boundary
    
    // Center line
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, GAME_HEIGHT/2); ctx.lineTo(GAME_WIDTH, GAME_HEIGHT/2); ctx.stroke();
    
    // 3 meter attack lines
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 5]);
    ctx.beginPath(); ctx.moveTo(0, GAME_HEIGHT/2 - 150); ctx.lineTo(GAME_WIDTH, GAME_HEIGHT/2 - 150); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, GAME_HEIGHT/2 + 150); ctx.lineTo(GAME_WIDTH, GAME_HEIGHT/2 + 150); ctx.stroke();
    ctx.setLineDash([]);
    
    // Net visualization (thicker, with posts)
    const netY = GAME_HEIGHT/2;
    // Net posts
    ctx.fillStyle = '#666'; 
    ctx.fillRect(-2, netY - 8, 8, 16);
    ctx.fillRect(GAME_WIDTH - 6, netY - 8, 8, 16);
    // Net mesh
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, netY); ctx.lineTo(GAME_WIDTH, netY); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
    for (let nx = 0; nx < GAME_WIDTH; nx += 15) {
        ctx.beginPath(); ctx.moveTo(nx, netY - 5); ctx.lineTo(nx, netY + 5); ctx.stroke();
    }
    
    // Players
    players.forEach(p => {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath(); ctx.arc(p.x, p.y+5, 12, 0, Math.PI*2); ctx.fill();
        
        // Body
        ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2);
        // Libero wears opposite color
        ctx.fillStyle = p.isLibero ? (p.team === team1 ? team2.color : team1.color) : p.team.color; 
        ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
        
        // Jersey number
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.numara, p.x, p.y);
        // Name
        ctx.font = 'bold 10px sans-serif'; 
        ctx.fillText(p.ad, p.x, p.y + 22);
    });

    // Ball spin trail (ghosting effect)
    const spinMag = Math.hypot(ball.spinX || 0, ball.spinY || 0);
    if (ball.z > 0 && spinMag > 0.03) {
        ctx.globalAlpha = 0.15;
        for (let t = 1; t <= 3; t++) {
            const trailSize = Math.max(3, 7 + ball.z * 0.15 - t);
            ctx.beginPath();
            ctx.arc(ball.x - ball.vx * t * 2, ball.y - ball.vy * t * 2 - ball.z + ball.vz * t, trailSize, 0, Math.PI*2);
            ctx.fillStyle = '#fde047'; ctx.fill();
        }
        ctx.globalAlpha = 1.0;
    }

    // Ball shadow
    const shadowOffset = ball.z * 0.5;
    const shadowSize = Math.max(3, 8 - ball.z * 0.1);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.arc(ball.x, ball.y + shadowOffset, shadowSize, 0, Math.PI*2); ctx.fill();
    
    // Ball
    const ballSize = Math.max(5, 8 + ball.z * 0.2);
    const ballDrawY = ball.y - ball.z;
    ctx.beginPath(); ctx.arc(ball.x, ballDrawY, ballSize, 0, Math.PI*2);
    
    // Ball color changes with speed
    const speed = Math.hypot(ball.vx, ball.vy, ball.vz);
    if (speed > 8) {
        ctx.fillStyle = '#ef4444'; // red = fast spike
    } else if (speed > 4) {
        ctx.fillStyle = '#fbbf24'; // amber = medium
    } else {
        ctx.fillStyle = '#fde047'; // yellow = slow set
    }
    ctx.fill();
    ctx.strokeStyle = '#1e3a8a'; ctx.lineWidth = 2; ctx.stroke();
    
    // Spin indicator (small line on ball)
    if (spinMag > 0.02) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ball.x, ballDrawY);
        ctx.lineTo(ball.x + (ball.spinX || 0) * 30, ballDrawY + (ball.spinY || 0) * 30);
        ctx.stroke();
    }
}

function gameLoop() {
    try {
        update();
        draw();
    } catch(e) { console.error(e); }
    requestAnimationFrame(gameLoop);
}

loadData();
</script>
</body>
</html>
