<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veli Girişi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-sky-950 flex items-center justify-center px-4 py-10 overflow-x-hidden">
  <main class="w-full max-w-sm">
    <div class="mb-4">
      <a href="{{ url_for('login') }}" class="inline-block rounded-xl bg-sky-800 hover:bg-sky-700 text-white px-4 py-2 text-xs font-black">
        Ana Menü
      </a>
    </div>
    <div class="text-center mb-6">
      <div class="text-5xl mb-3">👪</div>
      <h1 class="text-white text-2xl font-black">Veli Girişi</h1>
      <p class="text-sky-200 text-sm mt-1 break-words">Öğrenci gelişimini güvenli şekilde görüntüleyin</p>
    </div>

    <form method="POST" class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="bg-sky-700 px-5 py-4">
        <h2 class="text-white font-bold text-center">Güvenli veli erişimi</h2>
      </div>
      <div class="p-5 space-y-4">
        {% if hata %}
        <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-semibold text-red-700">
          {{ hata }}
        </div>
        {% endif %}
        <label class="block">
          <span class="block text-sm font-bold text-slate-700 mb-1">Öğrenci numarası</span>
          <input type="number" name="ogr_no" required inputmode="numeric" placeholder="Örn: 105"
                 class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900
                        outline-none focus:ring-2 focus:ring-sky-500">
        </label>
        <label class="block">
          <span class="block text-sm font-bold text-slate-700 mb-1">Veli şifresi</span>
          <input type="password" name="sifre" required autocomplete="current-password"
                 class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-slate-900
                        outline-none focus:ring-2 focus:ring-sky-500">
        </label>
        <button class="w-full rounded-xl bg-sky-600 hover:bg-sky-700 text-white font-black py-3 transition">
          Giriş Yap
        </button>
        <a href="{{ url_for('login') }}" class="block text-center text-xs font-bold text-slate-500 hover:text-slate-800">
          Ana girişe dön
        </a>
      </div>
    </form>
  </main>
</body>
</html>
