<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📺 Yayın Modu — {{ sinif_adi }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#060c1a; font-family:'Segoe UI',system-ui,sans-serif; }

    @keyframes pulse-danger {
      0%,100% { background-color:#1f0606; border-color:#7f1d1d; }
      50%      { background-color:#2d0a0a; border-color:#ef4444; }
    }
    @keyframes slide-in {
      from { opacity:0; transform:translateX(60px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes count-up {
      from { transform:scale(0.5); opacity:0; }
      to   { transform:scale(1);   opacity:1; }
    }
    @keyframes tick-clock {
      0%,100% { opacity:1; }
      50%      { opacity:.5; }
    }

    .card-danger  { animation: pulse-danger 1.4s ease-in-out infinite; }
    .card-warning { background:#1a1200; border-color:#92400e; }
    .card-clean   { background:#091a0e; border-color:#166534; }

    .slide-in { animation: slide-in .4s ease forwards; opacity:0; }
    .count-up { animation: count-up .3s ease forwards; }
    .clock    { animation: tick-clock 1s step-end infinite; }

    /* Scrollbar */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#1e293b; border-radius:2px; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

<!-- ── Üst Başlık ──────────────────────────────────────────────────────── -->
<header style="background:#0a1228" class="flex-shrink-0 border-b border-slate-800">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <div>
      <div class="text-blue-300 font-bold text-lg sm:text-xl">
        Erenler Cumhuriyet Ortaokulu
      </div>
      <div class="text-slate-500 text-sm">
        Canlı Disiplin Panosu &nbsp;·&nbsp;
        <span class="text-blue-400 font-semibold">{{ sinif_adi }} Şubesi</span>
      </div>
    </div>
    <div class="text-right">
      <div id="saat" class="text-slate-300 font-mono text-xl sm:text-2xl clock">--:--:--</div>
      <div class="text-slate-600 text-xs mt-0.5" id="guncelleme">Yükleniyor...</div>
    </div>
  </div>
</header>

<!-- ── Efsane ──────────────────────────────────────────────────────────── -->
<div style="background:#080f20"
     class="flex-shrink-0 flex justify-center gap-6 py-2 border-b border-slate-800/60">
  <span class="text-xs text-emerald-400">✅ Temiz</span>
  <span class="text-xs text-amber-400">⚠️ Uyarı (1–2 tik)</span>
  <span class="text-xs text-red-400">🚨 İdari İşlem (3+ tik)</span>
</div>

<!-- ── Öğrenci Listesi ─────────────────────────────────────────────────── -->
<main class="flex-1 overflow-y-auto px-3 py-4">
  <div id="liste" class="max-w-4xl mx-auto space-y-2">
    <div class="text-slate-600 text-center py-10 text-sm">Yükleniyor...</div>
  </div>
</main>

<!-- ── Alt Çubuk ───────────────────────────────────────────────────────── -->
<footer style="background:#080f20"
        class="flex-shrink-0 border-t border-slate-800 px-6 py-2
               flex items-center justify-between">
  <button onclick="window.close()"
          class="text-slate-500 hover:text-slate-300 text-xs transition">
    ✕ Kapat
  </button>
  <div class="flex gap-3 text-xs">
    <span id="stat-temiz" class="text-emerald-600">— temiz</span>
    <span id="stat-uyari" class="text-amber-600">— uyarı</span>
    <span id="stat-idari" class="text-red-600">— idari</span>
  </div>
  <button onclick="yukle()"
          class="text-slate-500 hover:text-slate-300 text-xs transition">
    🔄 Yenile
  </button>
</footer>

<script>
const SINIF_ID  = {{ sinif_id }};
const REFRESH_S = 10;
let countdown   = REFRESH_S;

// ── Saat ─────────────────────────────────────────────────────────────────
function saatGuncelle() {
  document.getElementById('saat').textContent =
    new Date().toLocaleTimeString('tr-TR');
}
setInterval(saatGuncelle, 1000);
saatGuncelle();

// ── Veri Yükleme ─────────────────────────────────────────────────────────
async function yukle() {
  countdown = REFRESH_S;
  try {
    const res  = await fetch(`/api/yayin/${SINIF_ID}`);
    const data = await res.json();
    renderListe(data);
    const now = new Date().toLocaleTimeString('tr-TR');
    document.getElementById('guncelleme').textContent = `Son güncelleme: ${now}`;
  } catch(e) {
    console.warn('Güncelleme hatası', e);
  }
}

function renderListe(data) {
  const konteyner = document.getElementById('liste');

  if (!data.length) {
    konteyner.innerHTML = '<p class="text-slate-600 text-center py-10">Bu sınıfta öğrenci yok.</p>';
    return;
  }

  // İstatistikler
  const temiz = data.filter(o => o.tik_sayisi === 0).length;
  const uyari = data.filter(o => o.tik_sayisi >= 1 && o.tik_sayisi <= 2).length;
  const idari = data.filter(o => o.tik_sayisi >= 3).length;
  document.getElementById('stat-temiz').textContent = `${temiz} temiz`;
  document.getElementById('stat-uyari').textContent = `${uyari} uyarı`;
  document.getElementById('stat-idari').textContent = `${idari} idari`;

  const maks   = Math.max(...data.map(o => o.tik_sayisi), 1);
  const barRef = Math.max(maks, 5);

  konteyner.innerHTML = data.map((o, idx) => kartHTML(o, idx + 1, barRef)).join('');
}

function kartHTML(o, sira, barRef) {
  const tik = o.tik_sayisi;

  let cardCls, textCls, barCls, rankBg;
  if (tik === 0) {
    cardCls = 'card-clean border';
    textCls = '#4ade80'; barCls = '#22c55e'; rankBg = '#166534';
  } else if (tik <= 2) {
    cardCls = 'card-warning border';
    textCls = '#fbbf24'; barCls = '#f59e0b'; rankBg = '#92400e';
  } else {
    cardCls = 'card-danger border';
    textCls = '#f87171'; barCls = '#ef4444'; rankBg = '#7f1d1d';
  }

  const barPct = Math.min(100, (tik / barRef) * 100).toFixed(1);
  const delay  = (sira - 1) * 70;

  return `
  <div class="${cardCls} rounded-xl overflow-hidden slide-in"
       style="animation-delay:${delay}ms">
    <div class="flex items-stretch">

      <!-- Sıra -->
      <div class="flex-shrink-0 w-14 sm:w-16 flex items-center justify-center
                  font-black text-lg sm:text-xl"
           style="background:${rankBg}; color:${textCls}">
        #${sira}
      </div>

      <!-- Orta: Emoji + Ad + Bar -->
      <div class="flex-1 px-3 sm:px-4 py-2.5 min-w-0">
        <div class="flex items-center gap-2">
          <span class="text-xl sm:text-2xl">${o.emoji}</span>
          <span class="font-bold text-sm sm:text-base truncate"
                style="color:${textCls}">${o.ad_soyad}</span>
          ${rozetHTML(o)}
        </div>
        ${o.xp ? `<div class="text-[10px] mt-0.5 text-indigo-300 font-bold">${o.xp} XP</div>` : ''}
        <!-- Progress bar -->
        <div class="mt-1.5 h-2 rounded-full overflow-hidden" style="background:#0f172a">
          <div class="h-full rounded-full transition-all duration-700"
               style="width:${barPct}%; background:${barCls}"></div>
        </div>
      </div>

      <!-- Tik Sayısı -->
      <div class="flex-shrink-0 w-16 sm:w-20 flex flex-col items-center justify-center"
           style="background:${rankBg}">
        <span class="font-black text-2xl sm:text-3xl count-up"
              style="color:${textCls}">${tik}</span>
        <span class="text-[10px]" style="color:${textCls}; opacity:.7">tik</span>
      </div>
    </div>
  </div>`;
}

function rozetHTML(o) {
  const rozetler = Array.isArray(o.rozetler) ? o.rozetler.slice(0, 4) : [];
  if (!rozetler.length) return '';
  const baslik = `${o.rozet_sayisi || rozetler.length} rozet · ${o.xp || 0} XP`;
  return `<span class="inline-flex gap-0.5 rounded-full border border-amber-500/50 bg-amber-950/40 px-1.5 py-0.5" title="${baslik}">
    ${rozetler.map(r => `<span class="text-lg">${r.emoji || '🏅'}</span>`).join('')}
  </span>`;
}

// ── Geri Sayım ───────────────────────────────────────────────────────────
setInterval(() => {
  countdown--;
  if (countdown <= 0) yukle();
  const el = document.getElementById('guncelleme');
  if (el && countdown > 0 && countdown <= REFRESH_S) {
    // Güncelleme satırındaki son kısmı değiştir
    const parts = el.textContent.split('·');
    el.textContent = (parts[0] || '') + `· ${countdown}s sonra güncellenir`;
  }
}, 1000);

// ── İlk Yükleme ──────────────────────────────────────────────────────────
yukle();
</script>
</body>
</html>
