{% if aktif_bilgilendirme %}
<div id="bilgilendirme-modal"
     class="fixed inset-0 z-[9999] hidden items-center justify-center bg-slate-950/60 px-4 py-6">
  <div class="w-full max-w-xl rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200">
    <div class="border-b border-slate-200 px-5 py-4">
      <div class="text-xs font-bold uppercase tracking-wide text-blue-700">Bilgilendirme</div>
      <h2 class="mt-1 text-xl font-black text-slate-900">{{ aktif_bilgilendirme.baslik }}</h2>
      <div class="mt-1 text-xs text-slate-500">
        {{ aktif_bilgilendirme.yayinlayan }} • {{ aktif_bilgilendirme.tarih }}
      </div>
    </div>
    <div class="max-h-[55vh] overflow-y-auto whitespace-pre-line px-5 py-4 text-sm leading-6 text-slate-700">
      {{ aktif_bilgilendirme.metin }}
    </div>
    <div class="flex flex-col-reverse gap-2 border-t border-slate-200 px-5 py-4 sm:flex-row sm:justify-end">
      <button type="button"
              data-bilgi-kapat
              class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50">
        Kapat
      </button>
      <button type="button"
              data-bilgi-okundu
              class="rounded-xl bg-blue-700 px-4 py-2 text-sm font-bold text-white hover:bg-blue-800">
        Okudum, bir daha gösterme
      </button>
    </div>
  </div>
</div>
<script>
(function () {
  const modal = document.getElementById("bilgilendirme-modal");
  if (!modal) return;
  const key = "bilgilendirme-okundu-{{ bilgilendirme_hedef }}-{{ aktif_bilgilendirme.id }}";
  const storage = window.localStorage;

  function hide() {
    modal.classList.add("hidden");
    modal.classList.remove("flex");
  }

  function show() {
    modal.classList.remove("hidden");
    modal.classList.add("flex");
  }

  if (!storage.getItem(key)) show();

  modal.querySelector("[data-bilgi-kapat]")?.addEventListener("click", hide);
  modal.querySelector("[data-bilgi-okundu]")?.addEventListener("click", function () {
    storage.setItem(key, "1");
    hide();
  });
})();
</script>
{% endif %}
