<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2D Maç Motoru</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
    #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    #header { height: 60px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid #333; }
    #score-board { font-size: 24px; font-weight: 900; letter-spacing: 2px; }
    #canvas-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
    canvas { background: #2f855a; border: 2px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 100%; max-height: 100%; }
    
    /* Overlay for match events */
    #event-overlay {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px;
      font-weight: bold; font-size: 16px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="game-container">
  <div id="header">
    <div class="text-blue-400 font-bold" id="team1-name">Bizim Sınıf</div>
    <div id="score-board"><span id="score1">0</span> - <span id="score2">0</span></div>
    <div class="text-red-400 font-bold" id="team2-name">Rakip Sınıf</div>
    <div class="absolute top-2 left-1/2 -translate-x-1/2 text-xs text-slate-400 font-mono" id="timer">00:00</div>
    <button onclick="window.close()" class="absolute right-4 top-14 mt-2 px-3 py-1 bg-red-600 rounded text-xs font-bold hover:bg-red-500 z-50 hidden" id="close-btn">Pencereyi Kapat</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="pitch"></canvas>
    <div id="event-overlay">Maç Başlıyor!</div>
  </div>
</div>

<script>
// URL Params
const urlParams = new URLSearchParams(window.location.search);
const rakip_id = urlParams.get('rakip_id');
const spor = urlParams.get('spor') || 'futbol';

// Game State
let isPlaying = false;
let timeTicks = 0; // 60 ticks = 1 second. 1 match = 90 mins game time = 180 seconds real time.
const TOTAL_TICKS = 180 * 60; 
let score1 = 0;
let score2 = 0;

// Canvas setup
const canvas = document.getElementById('pitch');
const ctx = canvas.getContext('2d');
const GAME_WIDTH = 600;
const GAME_HEIGHT = 900;
canvas.width = GAME_WIDTH;
canvas.height = GAME_HEIGHT;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const ratio = Math.min(wrap.clientWidth / GAME_WIDTH, wrap.clientHeight / GAME_HEIGHT) * 0.95;
  canvas.style.width = (GAME_WIDTH * ratio) + 'px';
  canvas.style.height = (GAME_HEIGHT * ratio) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Entities
let ball = { x: GAME_WIDTH/2, y: GAME_HEIGHT/2, vx: 0, vy: 0, speed: 0, owner: null };
let players = [];

// Teams
let team1 = { id: 1, name: "Biz", color: "#3b82f6", dirY: -1, goalY: 0 }; // attacks top
let team2 = { id: 2, name: "Rakip", color: "#ef4444", dirY: 1, goalY: GAME_HEIGHT }; // attacks bottom

function showEvent(text, duration=2000) {
  const el = document.getElementById('event-overlay');
  el.textContent = text;
  el.style.opacity = 1;
  setTimeout(() => el.style.opacity = 0, duration);
}

// Fetch Data
async function loadData() {
  try {
    const res = await fetch('/api/ogrenci/mac/2d_data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rakip_sinif_id: parseInt(rakip_id), spor: spor })
    });
    const data = await res.json();
    if (!data.ok) { alert("Veri yüklenemedi!"); return; }
    
    document.getElementById('team1-name').textContent = data.bizim_takim.ad;
    document.getElementById('team2-name').textContent = data.rakip_takim.ad;
    team1.name = data.bizim_takim.ad;
    team2.name = data.rakip_takim.ad;
    
    // Parse players
    // Bizim takim (Team 1) starts at bottom (Y=50..100 maps to 450..900)
    data.bizim_takim.oyuncular.forEach(p => {
        players.appendPlayer(p, team1, false);
    });
    
    // Rakip takim (Team 2) starts at top (Y=50..100 maps to 0..450 mirrored)
    data.rakip_takim.oyuncular.forEach(p => {
        players.appendPlayer(p, team2, true);
    });
    
    resetPositions();
    showEvent("Hakem düdüğü çaldı, maç başladı!", 3000);
    isPlaying = true;
    gameLoop();
  } catch(e) {
    alert("Hata: " + e.message);
  }
}

players.appendPlayer = function(p, team, mirror) {
    // p.baseX (0-100), p.baseY(0-100) from taktik
    let tx = (p.baseX / 100) * GAME_WIDTH;
    let ty = (p.baseY / 100) * GAME_HEIGHT;
    
    // Convert taktik Y (10=top, 90=bottom) to actual canvas
    // Team 1 defends bottom, attacks top. Taktik 10 is top (attack), 90 is bottom (defend).
    if (!mirror) {
        // Just use standard mapping, but flip if needed
        ty = (p.baseY / 100) * GAME_HEIGHT;
    } else {
        // Team 2 mirrored
        tx = GAME_WIDTH - tx;
        ty = GAME_HEIGHT - ((p.baseY / 100) * GAME_HEIGHT);
    }
    
    this.push({
        id: p.id, ad: p.ad, numara: p.numara, ovr: p.ovr,
        team: team,
        baseX: tx, baseY: ty,
        x: tx, y: ty,
        vx: 0, vy: 0,
        state: 'IDLE', // IDLE, CHASE, WITH_BALL, RETURN
        hasBallTime: 0
    });
};

function resetPositions() {
    players.forEach(p => {
        p.x = p.baseX;
        p.y = p.baseY;
        p.vx = 0; p.vy = 0;
        p.state = 'IDLE';
    });
    ball.x = GAME_WIDTH/2;
    ball.y = GAME_HEIGHT/2;
    ball.vx = 0; ball.vy = 0;
    ball.owner = null;
}

function dist(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
}

function normalize(dx, dy) {
    const len = Math.hypot(dx, dy);
    if(len === 0) return {x:0, y:0};
    return {x: dx/len, y: dy/len};
}

// Logic tick
function update() {
    if (!isPlaying) return;
    
    timeTicks++;
    const gameMin = Math.floor((timeTicks / TOTAL_TICKS) * 90);
    const gameSec = Math.floor(((timeTicks / TOTAL_TICKS) * 90 * 60) % 60);
    document.getElementById('timer').textContent = `${gameMin.toString().padStart(2,'0')}:${gameSec.toString().padStart(2,'0')}`;
    
    if (timeTicks >= TOTAL_TICKS) {
        isPlaying = false;
        showEvent("Maç Sona Erdi!", 5000);
        document.getElementById('close-btn').style.display = 'block';
        return;
    }

    // Ball physics
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= 0.96;
    ball.vy *= 0.96;
    ball.speed = Math.hypot(ball.vx, ball.vy);
    
    // Wall collisions
    if (ball.x < 10) { ball.x = 10; ball.vx *= -0.8; }
    if (ball.x > GAME_WIDTH-10) { ball.x = GAME_WIDTH-10; ball.vx *= -0.8; }
    
    // Goal zones (X: 200 to 400, Y: 0 or GAME_HEIGHT)
    if (ball.y < 5 && ball.x > GAME_WIDTH/2 - 80 && ball.x < GAME_WIDTH/2 + 80) {
        score1++;
        document.getElementById('score1').textContent = score1;
        showEvent(`GOOOL! ${team1.name}`, 3000);
        isPlaying = false;
        setTimeout(() => { resetPositions(); isPlaying = true; }, 3000);
        return;
    }
    if (ball.y > GAME_HEIGHT-5 && ball.x > GAME_WIDTH/2 - 80 && ball.x < GAME_WIDTH/2 + 80) {
        score2++;
        document.getElementById('score2').textContent = score2;
        showEvent(`GOOOL! ${team2.name}`, 3000);
        isPlaying = false;
        setTimeout(() => { resetPositions(); isPlaying = true; }, 3000);
        return;
    }
    
    // Out of bounds (Autoplay -> keep in bounds for simplicity, just bounce)
    if (ball.y < 5) { ball.y = 5; ball.vy *= -0.8; }
    if (ball.y > GAME_HEIGHT-5) { ball.y = GAME_HEIGHT-5; ball.vy *= -0.8; }

    // Ball ownership
    if (ball.owner) {
        ball.owner.hasBallTime++;
        ball.x = ball.owner.x + 10; // keep slightly in front
        ball.y = ball.owner.y + (ball.owner.team.dirY * 10);
        ball.vx = 0; ball.vy = 0;
    } else {
        // Try to claim ball
        players.forEach(p => {
            if (dist(p, ball) < 15 && ball.speed < 10) {
                ball.owner = p;
                p.state = 'WITH_BALL';
                p.hasBallTime = 0;
            }
        });
    }

    // AI Logic
    // Find closest player to ball for each team
    let closestT1 = null, minDistT1 = 9999;
    let closestT2 = null, minDistT2 = 9999;
    
    players.forEach(p => {
        const d = dist(p, ball);
        if (p.team.id === 1 && d < minDistT1) { minDistT1 = d; closestT1 = p; }
        if (p.team.id === 2 && d < minDistT2) { minDistT2 = d; closestT2 = p; }
    });

    players.forEach(p => {
        const speedMultiplier = (p.ovr / 100) * 3.5; // max speed ~3.5
        
        if (p === ball.owner) {
            // WITH BALL
            const distToGoal = Math.abs(p.y - p.team.goalY);
            
            // Should shoot?
            if (distToGoal < 250 && p.hasBallTime > 15) {
                // Shoot!
                const goalCenterX = GAME_WIDTH/2 + (Math.random()*40-20);
                const dir = normalize(goalCenterX - p.x, p.team.goalY - p.y);
                const power = 15 + (p.ovr/10);
                ball.vx = dir.x * power;
                ball.vy = dir.y * power;
                ball.owner = null;
                p.state = 'IDLE';
                showEvent(`${p.ad} şut çekiyor!`, 1000);
            } else if (p.hasBallTime > 30) {
                // Pass or dribble?
                // Simple: just dribble towards goal
                const dir = normalize(GAME_WIDTH/2 - p.x, p.team.goalY - p.y);
                p.vx = dir.x * speedMultiplier * 0.8; // slower with ball
                p.vy = dir.y * speedMultiplier * 0.8;
                
                // Random pass
                if (Math.random() < 0.05) {
                    // find teammate closer to goal
                    let bestMate = null;
                    players.forEach(m => {
                        if (m.team.id === p.team.id && m !== p) {
                            if ((p.team.id===1 && m.y < p.y) || (p.team.id===2 && m.y > p.y)) {
                                bestMate = m;
                            }
                        }
                    });
                    if (bestMate) {
                        const dirP = normalize(bestMate.x - p.x, bestMate.y - p.y);
                        ball.vx = dirP.x * 12;
                        ball.vy = dirP.y * 12;
                        ball.owner = null;
                        p.state = 'IDLE';
                    }
                }
            } else {
                // Just dribble
                const dir = normalize(GAME_WIDTH/2 - p.x, p.team.goalY - p.y);
                p.vx = dir.x * speedMultiplier * 0.8;
                p.vy = dir.y * speedMultiplier * 0.8;
            }
        } 
        else {
            // NOT BALL OWNER
            let targetX = p.baseX;
            let targetY = p.baseY;
            
            // Shift base based on ball position
            const ballYRatio = ball.y / GAME_HEIGHT;
            targetY = p.baseY + ((ballYRatio - 0.5) * 200); // move line up/down

            if (p === closestT1 || p === closestT2) {
                // Chase ball
                targetX = ball.x;
                targetY = ball.y;
            }

            // Move towards target
            const dir = normalize(targetX - p.x, targetY - p.y);
            const d = dist(p, {x:targetX, y:targetY});
            
            if (d > 5) {
                p.vx = dir.x * speedMultiplier;
                p.vy = dir.y * speedMultiplier;
            } else {
                p.vx = 0; p.vy = 0;
            }
        }

        // Apply vel
        p.x += p.vx;
        p.y += p.vy;
        
        // Bounds
        if(p.x < 10) p.x=10; if(p.x > GAME_WIDTH-10) p.x=GAME_WIDTH-10;
        if(p.y < 10) p.y=10; if(p.y > GAME_HEIGHT-10) p.y=GAME_HEIGHT-10;
    });
}

function draw() {
    // Clear pitch
    ctx.fillStyle = '#2f855a';
    ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
    
    // Lines
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    // Center line
    ctx.moveTo(0, GAME_HEIGHT/2); ctx.lineTo(GAME_WIDTH, GAME_HEIGHT/2);
    // Center circle
    ctx.arc(GAME_WIDTH/2, GAME_HEIGHT/2, 60, 0, Math.PI*2);
    // Penalty boxes
    ctx.rect(GAME_WIDTH/2 - 150, 0, 300, 150); // top
    ctx.rect(GAME_WIDTH/2 - 150, GAME_HEIGHT-150, 300, 150); // bot
    // Goal areas
    ctx.rect(GAME_WIDTH/2 - 80, 0, 160, 50);
    ctx.rect(GAME_WIDTH/2 - 80, GAME_HEIGHT-50, 160, 50);
    ctx.stroke();

    // Draw players
    players.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 12, 0, Math.PI*2);
        ctx.fillStyle = p.team.color;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = p.team.id === 1 ? '#bfdbfe' : '#fca5a5';
        ctx.stroke();
        
        // Number / Name
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.numara, p.x, p.y);
        
        ctx.font = 'bold 12px sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillText(p.ad, p.x, p.y + 22);
        
        // Rating
        ctx.fillStyle = p.ovr > 80 ? '#fbbf24' : '#a7f3d0';
        ctx.font = '10px monospace';
        ctx.fillText(p.ovr, p.x, p.y - 20);
    });

    // Draw ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, 6, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#000';
    ctx.stroke();
}

function gameLoop() {
    update();
    draw();
    if (isPlaying) {
        requestAnimationFrame(gameLoop);
    } else {
        // even if not playing, keep drawing so we see last frame
        draw();
        requestAnimationFrame(gameLoop);
    }
}

// Start
loadData();

</script>
</body>
</html>
