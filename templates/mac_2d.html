<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2D FM Maç Motoru (Pro)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
    #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    #header { height: 60px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 2px solid #333; }
    #score-board { font-size: 24px; font-weight: 900; letter-spacing: 2px; }
    #canvas-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
    canvas { background: #2f855a; border: 2px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-width: 100%; max-height: 100%; }
    #event-overlay {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px;
      font-weight: bold; font-size: 16px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #halftime-overlay {
      position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.92);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 20px;
    }
    #halftime-overlay.active { display: flex; }
    #halftime-overlay h2 { font-size: 28px; font-weight: 900; color: #fbbf24; }
    #halftime-overlay .ht-timer { font-size: 48px; font-weight: 900; color: #ef4444; font-family: monospace; }
    #halftime-overlay .ht-btn {
      padding: 12px 28px; border-radius: 12px; font-weight: 900; font-size: 16px;
      cursor: pointer; border: none; transition: transform 0.15s;
    }
    #halftime-overlay .ht-btn:hover { transform: scale(1.05); }
    #halftime-overlay .ht-status { font-size: 14px; color: #94a3b8; }
    #debug-panel {
      position: absolute; left: 10px; bottom: 10px; z-index: 80; display: none;
      max-width: min(540px, calc(100vw - 20px)); padding: 8px 10px;
      background: rgba(0,0,0,0.78); color: #bbf7d0; border: 1px solid rgba(187,247,208,0.35);
      border-radius: 8px; font: 11px/1.35 Consolas, monospace; white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div id="game-container">
  <div id="header">
    <div class="text-blue-400 font-bold" id="team1-name">Bizim Sınıf</div>
    <div id="score-board"><span id="score1">0</span> - <span id="score2">0</span></div>
    <div class="text-red-400 font-bold" id="team2-name">Rakip Sınıf</div>
    <div class="absolute top-2 left-1/2 -translate-x-1/2 text-xs text-slate-400 font-mono" id="timer">00:00</div>
    <button onclick="enableMatchAudio()" class="absolute right-24 top-14 mt-2 px-3 py-1 bg-emerald-600 rounded text-xs font-bold hover:bg-emerald-500 z-50 hidden" id="sound-btn">Sesi Aç</button>
    <button onclick="window.close()" class="absolute right-4 top-14 mt-2 px-3 py-1 bg-red-600 rounded text-xs font-bold hover:bg-red-500 z-50 hidden" id="close-btn">Pencereyi Kapat</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="pitch"></canvas>
    <div id="debug-panel"></div>
    <div id="event-overlay">Maç Başlıyor!</div>
  </div>
  <!-- Halftime Overlay -->
  <div id="halftime-overlay">
    <h2>⏸️ DEVRE ARASI</h2>
    <div class="text-lg text-slate-300">İlk Yarı: <span id="ht-score" class="text-white font-black"></span></div>
    <div class="ht-timer" id="ht-countdown">2:00</div>
    <button class="ht-btn" style="background:#3b82f6;color:#fff" onclick="openTaktik()">📋 Taktik Ekranını Aç</button>
    <button class="ht-btn" id="ht-ready-btn" style="background:#22c55e;color:#fff" onclick="htReady()">✅ Taktikleri Onayla (2. Yarıya Hazırım)</button>
    <div class="ht-status" id="ht-status">Taktik değişikliklerinizi yapın, süre dolunca 2. yarı başlar.</div>
  </div>
</div>

<script>
// URL Params
const urlParams = new URLSearchParams(window.location.search);
const rakip_id = urlParams.get('rakip_id');
const spor = urlParams.get('spor') || 'futbol';
const debugMode = urlParams.get('debug') === '1';

// Game Engine Config
const FPS = 60;
const GAME_WIDTH = 600;
const GAME_HEIGHT = 900;
const MID_Y = GAME_HEIGHT / 2;
let timeTicks = 0;
const TOTAL_TICKS = 180 * FPS; // 3 dakika gerçek zaman = 90 dk oyun zamanı

// === PHYSICS CONSTANTS ===
const GRASS_FRICTION = 0.965;    // Rolling friction on dry grass
const AIR_DRAG = 0.002;          // Air resistance coefficient
const BOUNCE_RESTITUTION = 0.6;  // Energy kept on bounce (40% loss)
const MAGNUS_COEFF = 0.12;       // Spin curve strength
const PLAYER_MASS = 75;          // kg (for collision calc)

// State
let isPlaying = false;
let score1 = 0, score2 = 0;
let stateMachine = "PLAYING"; // PLAYING, GOAL_CELEBRATION, SET_PIECE, HALFTIME
let isSecondHalf = false;
let htCountdown = 0; // halftime countdown in frames (2 min = 120*60)
let htTeamReady = false; // player confirmed tactics

// Canvas
const canvas = document.getElementById('pitch');
const ctx = canvas.getContext('2d');
const debugPanel = document.getElementById('debug-panel');
if (debugMode && debugPanel) debugPanel.style.display = 'block';
const soundBtn = document.getElementById('sound-btn');
const audio = {
    stadium: new Audio("{{ url_for('static', filename='audio/ortamstadium.mp3') }}"),
    goal: new Audio("{{ url_for('static', filename='audio/gol.mp3') }}"),
    kick: new Audio("{{ url_for('static', filename='audio/topavurus.mp3') }}"),
};
audio.stadium.loop = true;
audio.stadium.volume = 0.32;
audio.goal.volume = 0.9;
audio.kick.volume = 0.55;
let audioUnlocked = false;
let lastKickSoundAt = 0;
canvas.width = GAME_WIDTH;
canvas.height = GAME_HEIGHT;

function updateSoundButton() {
    if (!soundBtn) return;
    soundBtn.style.display = audioUnlocked ? 'none' : 'block';
}
async function enableMatchAudio() {
    audioUnlocked = true;
    updateSoundButton();
    try {
        if (isPlaying && audio.stadium.paused) {
            audio.stadium.currentTime = audio.stadium.currentTime || 0;
            await audio.stadium.play();
        }
    } catch (e) {
        audioUnlocked = false;
        updateSoundButton();
    }
}
function tryStartStadium() {
    if (!isPlaying) return;
    audio.stadium.play().then(() => {
        audioUnlocked = true;
        updateSoundButton();
    }).catch(() => {
        updateSoundButton();
    });
}
function stopStadium() {
    audio.stadium.pause();
}
// Stadyum sesi kesilmez — her 3 saniyede bir kontrol et
setInterval(() => {
    if (audioUnlocked && isPlaying && !stateMachine.includes('HALFTIME') && audio.stadium.paused) {
        audio.stadium.play().catch(() => {});
    }
}, 3000);
function playOneShot(baseAudio, volume = 1) {
    if (!audioUnlocked) return;
    // Her seferinde yeni klonla — önceki ses kesilmez, çakışabilir
    const sound = baseAudio.cloneNode();
    sound.volume = volume;
    sound.play().catch(() => {});
    return sound;
}
function playKickSound(force = false) {
    const now = performance.now();
    if (!force && now - lastKickSoundAt < 110) return;
    lastKickSoundAt = now;
    playOneShot(audio.kick, 0.55);
}
function playGoalSound() {
    playOneShot(audio.goal, 0.9);
}
['pointerdown', 'keydown', 'touchstart'].forEach(evt => {
    window.addEventListener(evt, enableMatchAudio, { once: true, passive: true });
});

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const ratio = Math.min(wrap.clientWidth / GAME_WIDTH, wrap.clientHeight / GAME_HEIGHT) * 0.95;
  canvas.style.width = (GAME_WIDTH * ratio) + 'px';
  canvas.style.height = (GAME_HEIGHT * ratio) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function showEvent(text, duration=2000) {
  const el = document.getElementById('event-overlay');
  el.textContent = text;
  el.style.opacity = 1;
  setTimeout(() => el.style.opacity = 0, duration);
}

// Math Utils
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function normalize(dx, dy) { const l = Math.hypot(dx, dy); return l===0 ? {x:0,y:0} : {x:dx/l, y:dy/l}; }
function randomRange(min, max) { return Math.random() * (max - min) + min; }
function ownHalfBounds(team, buffer = 28) {
    return team.defendY === 0
        ? { minY: buffer, maxY: MID_Y - buffer }
        : { minY: MID_Y + buffer, maxY: GAME_HEIGHT - buffer };
}
function isInOwnHalf(team, y) {
    return team.defendY === 0 ? y < MID_Y : y > MID_Y;
}
function clampToOwnHalf(team, x, y, buffer = 28) {
    const b = ownHalfBounds(team, buffer);
    return {
        x: Math.max(18, Math.min(GAME_WIDTH - 18, x)),
        y: Math.max(b.minY, Math.min(b.maxY, y)),
    };
}
function roleText(p) {
    return String(p.rol || "").toLowerCase();
}
function isGoalkeeper(p) {
    return Math.abs(p.baseY - p.team.defendY) < 55 || roleText(p).includes("kaleci");
}
function isDefender(p) {
    const r = roleText(p);
    return isGoalkeeper(p) || r.includes("defans") || r.includes("stoper") || r.includes("bek");
}
function isMidfielder(p) {
    const r = roleText(p);
    return r.includes("orta") || r.includes("merkez") || r.includes("libero");
}
function isForward(p) {
    const r = roleText(p);
    return r.includes("forvet") || r.includes("kanat") || r.includes("hücum") || r.includes("hucum");
}
function clampPitch(x, y, margin = 15) {
    return {
        x: Math.max(margin, Math.min(GAME_WIDTH - margin, x)),
        y: Math.max(margin, Math.min(GAME_HEIGHT - margin, y)),
    };
}
function clampGoalkeeperArea(p, x, y) {
    const minX = GAME_WIDTH / 2 - 145;
    const maxX = GAME_WIDTH / 2 + 145;
    const minY = p.team.defendY === 0 ? 8 : GAME_HEIGHT - 128;
    const maxY = p.team.defendY === 0 ? 128 : GAME_HEIGHT - 8;
    return {
        x: Math.max(minX, Math.min(maxX, x)),
        y: Math.max(minY, Math.min(maxY, y)),
    };
}
function goalkeeperTarget(p) {
    const goalLineY = p.team.defendY === 0 ? 18 : GAME_HEIGHT - 18;
    const stepOutY = p.team.defendY === 0 ? 48 : GAME_HEIGHT - 48;
    const ballNearGoal = Math.abs(ball.y - p.team.defendY) < 240;
    const ballInBox = Math.abs(ball.y - p.team.defendY) < 145 && Math.abs(ball.x - GAME_WIDTH / 2) < 165;
    let targetX = GAME_WIDTH / 2 + (ball.x - GAME_WIDTH / 2) * (ballNearGoal ? 0.75 : 0.3);
    let targetY = ballNearGoal ? stepOutY : goalLineY;

    if (ball.speed > 5 && ballNearGoal) {
        const lookahead = Math.min(20, Math.abs(ball.y - p.team.defendY) / Math.max(1, Math.abs(ball.vy)));
        targetX = ball.x + ball.vx * lookahead;
        targetY = goalLineY;
    } else if (!ball.owner && ballInBox && ball.speed < 7) {
        targetX = ball.x;
        targetY = ball.y;
    }

    return clampGoalkeeperArea(p, targetX, targetY);
}
function sendPass(p, target, power, leadFrames = 4) {
    const tx = target.x + (target.vx || 0) * leadFrames;
    const ty = target.y + (target.vy || 0) * leadFrames;
    const dir = normalize(tx - p.x, ty - p.y);
    ball.vx = dir.x * power;
    ball.vy = dir.y * power;
    ball.z = 0;
    ball.vz = 0;
    ball.spinX = 0;
    ball.spinY = 0;
    ball.targetPlayer = target.team ? target : null;
    ball.owner = null;
    ball.lastTouchedBy = p;
    playKickSound(true);
}
function goalkeeperDistribute(p) {
    let bestMate = null;
    let bestScore = -9999;
    players.forEach(m => {
        if (m.team !== p.team || m === p || isGoalkeeper(m)) return;
        const d = dist(p, m);
        if (d < 55 || d > 520) return;
        const forwardGain = Math.abs(m.y - p.team.defendY);
        let score = forwardGain * 0.55 - d * 0.22;
        if (isDefender(m) || isMidfielder(m)) score += 18;
        if (isForward(m) && forwardGain > 360) score += 8;
        players.forEach(opp => {
            if (opp.team !== p.team && dist(m, opp) < 75) score -= 55;
        });
        if (score > bestScore) {
            bestScore = score;
            bestMate = m;
        }
    });

    if (bestMate && (bestScore > -20 || p.hasBallTime > 28)) {
        sendPass(p, bestMate, 13 + p.ozellikler.pas / 28, 5);
    } else {
        const target = {
            x: GAME_WIDTH / 2 + randomRange(-130, 130),
            y: p.team.defendY + p.team.dirY * 430,
        };
        sendPass(p, target, 18 + p.ozellikler.pas / 22, 0);
        ball.vz = 4 + Math.random() * 2;
    }
    p.actionCooldown = 45;
    p.hasBallTime = 0;
    return true;
}

function threatScoreFor(defTeam, opp) {
    const goalDistance = Math.abs(opp.y - defTeam.defendY);
    let score = 1000 - goalDistance;
    if (isForward(opp)) score += 180;
    if (isMidfielder(opp)) score += 80;
    if (ball.owner === opp) score += 260;
    score += Math.max(0, 150 - Math.abs(opp.x - GAME_WIDTH / 2)) * 0.35;
    return score;
}

function buildMarkAssignments(defTeam, atkTeam) {
    const assignments = new Map();
    const defenders = players
        .filter(p => p.team === defTeam && !isGoalkeeper(p))
        .sort((a, b) => {
            const roleA = isDefender(a) ? 0 : (isMidfielder(a) ? 1 : 2);
            const roleB = isDefender(b) ? 0 : (isMidfielder(b) ? 1 : 2);
            return roleA - roleB || Math.abs(a.baseY - defTeam.defendY) - Math.abs(b.baseY - defTeam.defendY);
        });
    const threats = players
        .filter(p => p.team === atkTeam && !isGoalkeeper(p))
        .sort((a, b) => threatScoreFor(defTeam, b) - threatScoreFor(defTeam, a));

    threats.forEach(threat => {
        let bestDef = null;
        let bestScore = Infinity;
        defenders.forEach(def => {
            if (assignments.has(def)) return;
            let score = dist(def, threat);
            if (isDefender(def) && isForward(threat)) score -= 45;
            if (isMidfielder(def) && isMidfielder(threat)) score -= 25;
            if (!isDefender(def) && isForward(threat)) score += 25;
            score += Math.abs(def.baseX - threat.x) * 0.15;
            if (score < bestScore) {
                bestScore = score;
                bestDef = def;
            }
        });
        if (bestDef) assignments.set(bestDef, threat);
    });
    return assignments;
}

// Entities
let ball = {
    x: GAME_WIDTH/2, y: GAME_HEIGHT/2, z: 0,
    vx: 0, vy: 0, vz: 0,
    spinX: 0, spinY: 0, // angular velocity for magnus
    speed: 0, owner: null, targetPlayer: null, lastTouchedBy: null
};
let players = [];

let team1 = { id: 1, name: "Biz", color: "#3b82f6", dirY: -1, goalY: 0, defendY: GAME_HEIGHT };
let team2 = { id: 2, name: "Rakip", color: "#ef4444", dirY: 1, goalY: GAME_HEIGHT, defendY: 0 };

let setPieceType = "";
let setPieceTimer = 0;
let setPieceTeam = null;

async function loadData() {
  try {
    showEvent("Veri bekleniyor...", 5000);
    const res = await fetch('/api/ogrenci/mac/2d_data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rakip_sinif_id: parseInt(rakip_id), spor: spor })
    });
    
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    if (!data.ok) { showEvent("Hata: " + (data.sebep||"Bilinmiyor"), 5000); return; }
    
    document.getElementById('team1-name').textContent = data.bizim_takim.ad;
    document.getElementById('team2-name').textContent = data.rakip_takim.ad;
    team1.name = data.bizim_takim.ad;
    team2.name = data.rakip_takim.ad;
    
    data.bizim_takim.oyuncular.forEach(p => addPlayer(p, team1, false));
    data.rakip_takim.oyuncular.forEach(p => addPlayer(p, team2, true));
    normalizeTeamShape(team1);
    normalizeTeamShape(team2);
    
    resetPositions();
    showEvent("Hakem düdüğü çaldı, taktiksel maç başladı!", 3000);
    isPlaying = true;
    tryStartStadium();
    requestAnimationFrame(gameLoop);
  } catch(e) {
    showEvent("JS Hatası: " + e.message, 10000);
  }
}

function addPlayer(p, team, mirror) {
    let tx = (p.baseX / 100) * GAME_WIDTH;
    let ty = (p.baseY / 100) * GAME_HEIGHT;
    
    if (mirror) {
        tx = GAME_WIDTH - tx;
        ty = GAME_HEIGHT - ty;
    }
    
    players.push({
        id: p.id, ad: p.ad, numara: p.numara, ovr: p.ovr, rol: p.rol || "", team: team,
        ozellikler: p.ozellikler || {hiz: p.ovr, sut: p.ovr, pas: p.ovr, defans: p.ovr, kaleci: p.ovr},
        baseX: tx, baseY: ty,
        x: tx, y: ty, vx: 0, vy: 0,
        mass: PLAYER_MASS + (Math.random()*20 - 10), // slight variation
        stamina: 100,
        state: 'IDLE',
        hasBallTime: 0,
        actionCooldown: 0
    });
}

function formationLine(team, depthFromOwnGoal) {
    return team.defendY === 0 ? depthFromOwnGoal : GAME_HEIGHT - depthFromOwnGoal;
}
function spreadLine(playersOnLine, y) {
    if (!playersOnLine.length) return;
    const gap = GAME_WIDTH / (playersOnLine.length + 1);
    playersOnLine.forEach((p, idx) => {
        p.baseX = gap * (idx + 1);
        p.baseY = y;
    });
}
function normalizeTeamShape(team) {
    const roster = players.filter(p => p.team === team);
    if (!roster.length) return;

    let gk = roster.find(p => roleText(p).includes("kaleci"))
        || roster.find(p => Math.abs(p.baseY - team.defendY) < 95)
        || roster.reduce((best, p) =>
            Math.abs(p.baseY - team.defendY) < Math.abs(best.baseY - team.defendY) ? p : best
        );

    gk.rol = "Kaleci";
    if (Math.abs(gk.baseY - team.defendY) > 115 || Math.abs(gk.baseX - GAME_WIDTH / 2) > 160) {
        gk.baseX = GAME_WIDTH / 2;
        gk.baseY = team.defendY === 0 ? 28 : GAME_HEIGHT - 28;
    }

    const fieldPlayers = roster.filter(p => p !== gk);
    if (!fieldPlayers.length) return;

    const ys = fieldPlayers.map(p => p.baseY);
    const ySpan = Math.max(...ys) - Math.min(...ys);
    if (ySpan < 180 && fieldPlayers.length >= 8) {
        const ordered = fieldPlayers.slice().sort((a, b) => a.numara - b.numara);
        spreadLine(ordered.slice(0, 4), formationLine(team, 205));
        spreadLine(ordered.slice(4, 8), formationLine(team, 415));
        spreadLine(ordered.slice(8), formationLine(team, 635));
    }

    fieldPlayers.forEach(p => {
        const r = roleText(p);
        if (r && r !== "oyuncu") return;
        const depth = Math.abs(p.baseY - team.defendY);
        if (depth < 310) p.rol = "Defans";
        else if (depth < 560) p.rol = "Orta Saha";
        else p.rol = "Forvet";
    });
}

function clampPlayerToPitch(p) {
    const safe = clampPitch(p.x, p.y, 15);
    p.x = safe.x;
    p.y = safe.y;
    if (isGoalkeeper(p)) {
        const gkSafe = clampGoalkeeperArea(p, p.x, p.y);
        p.x = gkSafe.x;
        p.y = gkSafe.y;
    }
}

function separatePlayers() {
    for (let pass = 0; pass < 2; pass++) {
        for (let i = 0; i < players.length; i++) {
            for (let j = i + 1; j < players.length; j++) {
                const a = players[i];
                const b = players[j];
                const sameTeam = a.team === b.team;
                const minGap = sameTeam ? 28 : 25;
                let dx = b.x - a.x;
                let dy = b.y - a.y;
                let d = Math.hypot(dx, dy);
                if (d >= minGap) continue;
                if (d < 0.01) {
                    const angle = (i + j + pass) * 1.7;
                    dx = Math.cos(angle);
                    dy = Math.sin(angle);
                    d = 1;
                }
                const nx = dx / d;
                const ny = dy / d;
                const overlap = minGap - d;
                let aWeight = isGoalkeeper(a) ? 0.4 : 1;
                let bWeight = isGoalkeeper(b) ? 0.4 : 1;
                if (a === ball.owner) aWeight *= 0.45;
                if (b === ball.owner) bWeight *= 0.45;
                if (stateMachine === "SET_PIECE") {
                    if (a === ball.owner) aWeight = 0;
                    if (b === ball.owner) bWeight = 0;
                }
                const total = aWeight + bWeight || 1;
                a.x -= nx * overlap * (bWeight / total);
                a.y -= ny * overlap * (bWeight / total);
                b.x += nx * overlap * (aWeight / total);
                b.y += ny * overlap * (aWeight / total);
                clampPlayerToPitch(a);
                clampPlayerToPitch(b);
            }
        }
    }
    if (ball.owner) {
        ball.x = ball.owner.x;
        ball.y = ball.owner.y;
    }
}

function resetPositions() {
    players.forEach(p => {
        p.x = p.baseX; p.y = p.baseY; p.vx = 0; p.vy = 0;
        p.state = 'IDLE'; p.stamina = 100;
    });
    ball.x = GAME_WIDTH/2; ball.y = GAME_HEIGHT/2; ball.z = 0;
    ball.vx = 0; ball.vy = 0; ball.vz = 0;
    ball.spinX = 0; ball.spinY = 0;
    ball.owner = null; ball.targetPlayer = null;
    ball.lastTouchedBy = null;
    stateMachine = "PLAYING";
}

function getTeamWithBall() {
    if (ball.owner) return ball.owner.team;
    if (ball.targetPlayer) return ball.targetPlayer.team;
    return null;
}

function updateDebugPanel() {
    if (!debugMode || !debugPanel || timeTicks % 30 !== 0) return;
    const lines = [];
    const activeTeam = getTeamWithBall();
    [team1, team2].forEach(team => {
        const roster = players.filter(p => p.team === team);
        const gk = roster.find(isGoalkeeper);
        const field = roster.filter(p => !isGoalkeeper(p));
        const def = field.filter(isDefender).length;
        const mid = field.filter(isMidfielder).length;
        const fwd = field.filter(isForward).length;
        const outOfShape = field.filter(p => {
            if (stateMachine === "SET_PIECE" && setPieceTeam && p.team !== setPieceTeam) {
                return !isInOwnHalf(team, p.y);
            }
            if (activeTeam && activeTeam !== team && p.state !== 'CHASE') {
                return !isInOwnHalf(team, p.y);
            }
            return false;
        }).length;
        const gkText = gk ? `${Math.round(gk.x)},${Math.round(gk.y)}` : 'yok';
        lines.push(`${team.name}: GK ${gkText} | D/M/F ${def}/${mid}/${fwd} | sekilUyari ${outOfShape}`);
    });
    lines.push(`top ${Math.round(ball.x)},${Math.round(ball.y)} hiz ${ball.speed.toFixed(1)} | ${stateMachine}`);
    debugPanel.textContent = lines.join("\\n");
}

// AI Update Loop
function update() {
    if (!isPlaying) return;
    if (stateMachine === "GOAL_CELEBRATION") return;
    if (stateMachine === "HALFTIME") {
        // Halftime countdown handled by setInterval, not gameLoop
        return;
    }
    timeTicks++;
    
    const gameMin = Math.floor((timeTicks / TOTAL_TICKS) * 90);
    const gameSec = Math.floor(((timeTicks / TOTAL_TICKS) * 90 * 60) % 60);
    document.getElementById('timer').textContent = `${gameMin.toString().padStart(2,'0')}:${gameSec.toString().padStart(2,'0')}`;
    
    // Halftime check at 45 min (halfway)
    if (!isSecondHalf && timeTicks >= TOTAL_TICKS / 2) {
        startHalftime();
        return;
    }
    
    if (timeTicks >= TOTAL_TICKS) {
        isPlaying = false; showEvent("Maç Sona Erdi!", 5000);
        stopStadium();
        document.getElementById('close-btn').style.display = 'block';
        
        // Auto-submit result
        if (window.opener && !window.opener.closed) {
            try {
                const spor = new URLSearchParams(window.location.search).get("spor") || "futbol";
                const doc = window.opener.document;
                const in1 = doc.getElementById("skor1-" + spor);
                const in2 = doc.getElementById("skor2-" + spor);
                if (in1 && in2) {
                    in1.value = score1;
                    in2.value = score2;
                    const form = in1.closest('form');
                    if (form) {
                        form.submit();
                        setTimeout(() => showEvent("Sonuç öğretmene başarıyla gönderildi!", 5000), 1000);
                    }
                }
            } catch (e) {
                console.error("Auto submit failed", e);
            }
        }
        return;
    }

    // Set Piece State
    if (stateMachine === "SET_PIECE") {
        // Realistic player repositioning (Football Manager Style)
        const atkGoalY = setPieceTeam.goalY; // goal the attacking team targets
        const defGoalY = setPieceTeam.goalY; // defending team's goal line is the target goal
        const atkDir = setPieceTeam.dirY; // -1 or 1
        
        let atkCount = 0;
        let defCount = 0;
        
        players.forEach(p => {
            if (p === ball.owner) return; // taker stays at ball
            
            const isGK = isGoalkeeper(p);
            const isDefensiveRole = isDefender(p);
            const rol = roleText(p);
            const isForwardRole = rol.includes("forvet") || rol.includes("kanat") || rol.includes("hücum") || rol.includes("hucum");
            let targetX = p.baseX;
            let targetY = p.baseY;
            
            if (setPieceType === "PENALTI") {
                if (isGK && p.team !== setPieceTeam) {
                    targetX = GAME_WIDTH / 2; targetY = defGoalY === 0 ? 5 : GAME_HEIGHT - 5;
                } else if (isGK && p.team === setPieceTeam) {
                    targetX = GAME_WIDTH / 2; targetY = p.team.defendY === 0 ? 80 : GAME_HEIGHT - 80;
                } else {
                    // Everyone else stands exactly outside the penalty box and arc.
                    const penSpotY = atkGoalY === 0 ? 110 : GAME_HEIGHT - 110;
                    const isDef = p.team !== setPieceTeam;
                    if (isDef) defCount++; else atkCount++;
                    
                    const lineY = atkGoalY === 0 ? 135 : GAME_HEIGHT - 135;
                    const idx = isDef ? defCount : atkCount;
                    const offset = isDef ? (idx * 25) : (idx * 25 + 10);
                    targetX = GAME_WIDTH / 2 + (idx % 2 === 0 ? offset : -offset);
                    targetY = lineY + (atkDir * -20); 
                    
                    if (dist({x: targetX, y: targetY}, {x: GAME_WIDTH/2, y: penSpotY}) < 65) {
                        targetY += (atkDir * -30); // push back out of arc
                    }
                }
            } else if (setPieceType === "FRİKİK") {
                const isDef = p.team !== setPieceTeam;
                if (isDef) defCount++; else atkCount++;
                const dirToGoal = normalize(GAME_WIDTH/2 - ball.x, defGoalY - ball.y);
                const ballInDefendingHalf = isInOwnHalf(p.team, ball.y);
                
                if (isGK && isDef) {
                    const goalCenterX = GAME_WIDTH/2;
                    targetX = goalCenterX + (ball.x - goalCenterX) * 0.25;
                    targetY = defGoalY === 0 ? 18 : GAME_HEIGHT - 18;
                } else if (isDef) {
                    const distToGoal = dist(ball, {x: GAME_WIDTH/2, y: defGoalY});
                    const needsWall = ballInDefendingHalf && distToGoal < 300;
                    const wallSize = needsWall ? Math.max(2, Math.min(5, Math.floor((350 - distToGoal)/40))) : 0;
                    
                    if (defCount <= wallSize) {
                        const perpX = -dirToGoal.y; const perpY = dirToGoal.x;
                        const wallCenterX = ball.x + dirToGoal.x * 80;
                        const wallCenterY = ball.y + dirToGoal.y * 80;
                        const offset = (defCount - (wallSize+1)/2) * 16;
                        targetX = wallCenterX + perpX * offset;
                        targetY = wallCenterY + perpY * offset;
                    } else {
                        // Faulde savunan takım kendi yarı sahasında bekler ve kaleyi kapatan hat kurar.
                        const half = ownHalfBounds(p.team, 42);
                        const depth = isDefensiveRole ? 115 : (isForwardRole ? 285 : 205);
                        const lineFromGoal = p.team.defendY === 0
                            ? Math.min(half.maxY, p.team.defendY + depth)
                            : Math.max(half.minY, p.team.defendY - depth);
                        const sideSpread = (defCount % 2 === 0 ? 1 : -1) * (38 + (defCount % 4) * 22);
                        targetX = GAME_WIDTH / 2 + sideSpread;
                        targetY = lineFromGoal;
                    }
                } else {
                    if (atkCount === 1) { // Short option
                        targetX = ball.x + (ball.x < GAME_WIDTH/2 ? 40 : -40);
                        targetY = ball.y + atkDir * 20;
                    } else if (atkCount <= 5 && !isDefensiveRole) { // Runs into box
                        targetX = GAME_WIDTH/2 + (atkCount % 2 === 0 ? 1 : -1) * (10 + atkCount*15);
                        targetY = defGoalY === 0 ? 100 + atkCount*10 : GAME_HEIGHT - (100 + atkCount*10);
                    } else { // Stay back
                        targetX = p.baseX;
                        targetY = Math.max(120, Math.min(GAME_HEIGHT - 120, p.baseY + p.team.dirY * 45));
                    }
                }
            } else if (setPieceType === "KORNER") {
                const isLeftCorner = ball.x < GAME_WIDTH/2;
                const isDef = p.team !== setPieceTeam;
                if (isDef) defCount++; else atkCount++;
                const goalDir = defGoalY === 0 ? 1 : -1;
                
                if (isGK && isDef) {
                    targetX = isLeftCorner ? GAME_WIDTH/2 - 20 : GAME_WIDTH/2 + 20;
                    targetY = defGoalY === 0 ? 10 : GAME_HEIGHT - 10;
                } else if (isDef) {
                    if (defCount <= 4) {
                        targetX = GAME_WIDTH/2 + (defCount % 2 === 0 ? 1 : -1) * (35 + defCount * 12);
                        targetY = defGoalY + goalDir * (70 + defCount * 18);
                    } else if (defCount <= 7) {
                        targetX = GAME_WIDTH/2 + (defCount % 2 === 0 ? 1 : -1) * (55 + (defCount - 4) * 22);
                        targetY = defGoalY + goalDir * 165;
                    } else {
                        targetX = p.baseX;
                        targetY = Math.max(130, Math.min(GAME_HEIGHT - 130, p.baseY));
                    }
                } else {
                    if (atkCount === 1) { targetX = ball.x + (isLeftCorner ? 60 : -60); targetY = ball.y + (defGoalY === 0 ? 40 : -40); }
                    else if (atkCount <= 5 && !isDefensiveRole) { targetX = GAME_WIDTH/2 + (atkCount % 2 === 0 ? 1 : -1) * (20 + atkCount*12); targetY = defGoalY === 0 ? 65 + atkCount*12 : GAME_HEIGHT - (65 + atkCount*12); }
                    else if (atkCount <= 7 && isForwardRole) { targetX = GAME_WIDTH/2 + (atkCount === 6 ? -50 : 50); targetY = defGoalY === 0 ? 155 : GAME_HEIGHT - 155; }
                    else {
                        targetX = p.baseX;
                        targetY = Math.max(130, Math.min(GAME_HEIGHT - 130, p.baseY + p.team.dirY * 35));
                    }
                }
            } else if (setPieceType === "TAC") {
                const isDef = p.team !== setPieceTeam;
                if (isDef) defCount++; else atkCount++;
                
                const sidelineDir = ball.x < GAME_WIDTH/2 ? 1 : -1;
                
                if (isDef) {
                    if (defCount <= 3) { // Press the throw
                        targetX = ball.x + sidelineDir * (40 + defCount*15);
                        targetY = ball.y + (defCount === 1 ? -30 : (defCount === 2 ? 0 : 30));
                    } else { // Shift block
                        targetX = p.baseX + sidelineDir * ((GAME_WIDTH/2) - Math.abs(GAME_WIDTH/2 - ball.x)) * 0.5;
                        targetY = p.baseY;
                    }
                } else {
                    if (atkCount <= 2) { // Short
                        targetX = ball.x + sidelineDir * 50; targetY = ball.y + (atkCount === 1 ? -40 : 40);
                    } else if (atkCount === 3) { // Down line
                        targetX = ball.x + sidelineDir * 20; targetY = ball.y + atkDir * 80;
                    } else { // Shift
                        targetX = p.baseX + sidelineDir * ((GAME_WIDTH/2) - Math.abs(GAME_WIDTH/2 - ball.x)) * 0.4;
                        targetY = p.baseY;
                    }
                }
            } else if (setPieceType === "AUT") {
                if (isGK && p.team === setPieceTeam) {
                    targetX = GAME_WIDTH/2; targetY = p.team.defendY === 0 ? 60 : GAME_HEIGHT - 60;
                } else if (p.team === setPieceTeam) {
                    targetX = p.baseX; targetY = p.baseY + p.team.dirY * -100; // Drop deep to receive
                } else {
                    targetX = p.baseX; targetY = p.baseY + p.team.dirY * 100; // Push up to press
                }
            }
            
            targetX = Math.max(15, Math.min(GAME_WIDTH-15, targetX));
            targetY = Math.max(15, Math.min(GAME_HEIGHT-15, targetY));
            if ((setPieceType === "FRİKİK" || setPieceType === "PENALTI") && p.team !== setPieceTeam) {
                const safePos = clampToOwnHalf(p.team, targetX, targetY, isGK ? 12 : 30);
                targetX = safePos.x;
                targetY = isGK ? (p.team.defendY === 0 ? 18 : GAME_HEIGHT - 18) : safePos.y;
            }
            
            const dir = normalize(targetX - p.x, targetY - p.y);
            const d = dist(p, {x:targetX, y:targetY});
            if (d > 5) { p.x += dir.x * 3; p.y += dir.y * 3; }
        });
        separatePlayers();

        setPieceTimer--;
        if (setPieceTimer <= 0) {
            // Take the set piece
            if (ball.owner) {
                const p = ball.owner;
                
                const goalDistance = dist(p, {x: GAME_WIDTH/2, y: p.team.goalY});
                const directShot = setPieceType === "PENALTI" || (setPieceType === "FRİKİK" && goalDistance < 270);
                if (directShot) {
                    // Shoot directly at goal
                    const errMargin = (100 - p.ozellikler.sut) / 100;
                    const gX = GAME_WIDTH/2 + (Math.random() * 80 - 40);
                    const errX = (Math.random() * 200 - 100) * errMargin;
                    const dir = normalize((gX + errX) - p.x, p.team.goalY - p.y);
                    const power = setPieceType === "PENALTI" ? 22 : 18 + (p.ozellikler.sut / 12);
                    ball.vx = dir.x * power; ball.vy = dir.y * power;
                } else {
                    // find teammate for throw-in or corner
                    let bestMate = null; let bestScore = -999;
                    players.forEach(m => {
                        if (m.team === p.team && m !== p) {
                            const score = -dist(p, m) + (setPieceType === "KORNER" ? -dist(m, {x:GAME_WIDTH/2, y:p.team.goalY}) : 0);
                            if (score > bestScore) { bestScore = score; bestMate = m; }
                        }
                    });
                    
                    if (bestMate) {
                        const errMargin = (100 - p.ozellikler.pas) / 100;
                        const errX = (Math.random() * 100 - 50) * errMargin;
                        const errY = (Math.random() * 100 - 50) * errMargin;
                        const dir = normalize((bestMate.x + errX) - p.x, (bestMate.y + errY) - p.y);
                        const basePower = setPieceType === "KORNER" ? 18 : 12;
                        const power = basePower + (p.ozellikler.pas / 20) + (Math.random()*4-2)*errMargin;
                        ball.vx = dir.x * power; ball.vy = dir.y * power;
                        ball.targetPlayer = bestMate;
                    } else {
                        ball.vx = (GAME_WIDTH/2 - p.x) * 0.05; ball.vy = (p.team.goalY - p.y) * 0.05;
                    }
                }
                
                playKickSound(true);
                ball.lastTouchedBy = p;
                ball.owner = null;
                p.actionCooldown = 30;
            }
            stateMachine = "PLAYING";
            showEvent("Oyun devam ediyor!", 1000);
        }
        updateDebugPanel();
        return;
    }

    // === ADVANCED BALL PHYSICS ===
    // Gravity
    ball.vz -= 0.15;
    ball.z += ball.vz;
    
    // Bounce off ground
    if (ball.z <= 0) {
        ball.z = 0;
        if (ball.vz < -1) {
            ball.vz = -ball.vz * BOUNCE_RESTITUTION; // bounce with energy loss
            ball.vx *= 0.9; ball.vy *= 0.9; // horizontal energy loss on bounce
        } else {
            ball.vz = 0; // settle on ground
        }
    }
    
    // Ground friction (only when on ground)
    if (ball.z <= 0.5) {
        ball.vx *= GRASS_FRICTION;
        ball.vy *= GRASS_FRICTION;
    }
    
    // Air drag (when airborne, proportional to speed²)
    if (ball.z > 0.5) {
        const spd = Math.hypot(ball.vx, ball.vy);
        if (spd > 0.5) {
            const drag = AIR_DRAG * spd * spd;
            const ratio = Math.max(0, 1 - drag / spd);
            ball.vx *= ratio;
            ball.vy *= ratio;
        }
    }
    
    // Magnus Effect (spin curves ball)
    if (ball.z > 0 && (Math.abs(ball.spinX) > 0.01 || Math.abs(ball.spinY) > 0.01)) {
        ball.vx += ball.spinX * MAGNUS_COEFF;
        ball.vy += ball.spinY * MAGNUS_COEFF;
        ball.spinX *= 0.97; ball.spinY *= 0.97; // spin decay
    }
    
    // Apply velocity
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.speed = Math.hypot(ball.vx, ball.vy);
    
    // Goal Check: Ball must beat the goalkeeper
    const goalLeft = GAME_WIDTH/2 - 75, goalRight = GAME_WIDTH/2 + 75;
    function tryGoal(scoringTeam, defendingTeam, scoreEl, goalY) {
        // Find GK of defending team
        const gk = players.find(p => p.team === defendingTeam && isGoalkeeper(p));
        if (gk) {
            const savePower = gk.ozellikler.kaleci + Math.random() * 30;
            const shotPower = (ball.lastTouchedBy ? ball.lastTouchedBy.ozellikler.sut : 50) + Math.random() * 20;
            // GK save chance: higher kaleci = higher save rate
            if (savePower > shotPower || dist(gk, ball) < 35) {
                // SAVE!
                showEvent(`${gk.ad} KURTARDI! 🧤`, 2000);
                // GK pushes ball away
                const pushDir = normalize(ball.x - GAME_WIDTH/2, ball.y - defendingTeam.defendY);
                ball.vx = pushDir.x * 10 + (Math.random()-0.5)*6;
                ball.vy = pushDir.y * 10;
                ball.owner = null;
                ball.lastTouchedBy = gk;
                playKickSound(true);
                return false;
            }
        }
        return true;
    }
    
    if (ball.y <= 10 && ball.x > goalLeft && ball.x < goalRight) {
        if (tryGoal(team1, team2, 'score1', 0)) {
            score1++; document.getElementById('score1').textContent = score1;
            playGoalSound();
            showEvent(`⚽ GOOOL! ${team1.name} yazdı!`, 4000);
            stateMachine = "GOAL_CELEBRATION";
            setTimeout(resetPositions, 4000);
        }
        return;
    }
    if (ball.y >= GAME_HEIGHT-10 && ball.x > goalLeft && ball.x < goalRight) {
        if (tryGoal(team2, team1, 'score2', GAME_HEIGHT)) {
            score2++; document.getElementById('score2').textContent = score2;
            playGoalSound();
            showEvent(`⚽ GOOOL! ${team2.name} yazdı!`, 4000);
            stateMachine = "GOAL_CELEBRATION";
            setTimeout(resetPositions, 4000);
        }
        return;
    }

    // Out of bounds logic
    let isOut = false;
    if (ball.x < 0 || ball.x > GAME_WIDTH) {
        isOut = true;
        setPieceType = "TAC";
        ball.x = Math.max(2, Math.min(GAME_WIDTH-2, ball.x));
    } else if (ball.y < 0 || ball.y > GAME_HEIGHT) {
        isOut = true;
        const defendingTeam = ball.y < 0 ? team2 : team1;
        if (ball.lastTouchedBy && ball.lastTouchedBy.team === defendingTeam) {
            setPieceType = "KORNER";
            ball.x = ball.x < GAME_WIDTH/2 ? 5 : GAME_WIDTH-5;
            ball.y = ball.y < 0 ? 5 : GAME_HEIGHT-5;
        } else {
            setPieceType = "AUT";
            ball.x = GAME_WIDTH/2;
            ball.y = ball.y < 0 ? 60 : GAME_HEIGHT-60;
        }
    }

    if (isOut) {
        stateMachine = "SET_PIECE";
        setPieceTimer = 90; // 1.5 seconds wait
        setPieceTeam = ball.lastTouchedBy && ball.lastTouchedBy.team === team1 ? team2 : team1;
        
        // Pick a player to take it
        let taker = null;
        if (setPieceType === "AUT") {
            taker = players.find(p => p.team === setPieceTeam && isGoalkeeper(p))
                || players.find(p => p.team === setPieceTeam && isDefender(p));
        }
        if (!taker) {
            let closest = null; let d = 9999;
            players.forEach(p => {
                if (p.team === setPieceTeam && !isGoalkeeper(p) && dist(p, ball) < d) {
                    d = dist(p, ball);
                    closest = p;
                }
            });
            taker = closest;
        }
        
        ball.vx = 0; ball.vy = 0;
        ball.owner = taker;
        if (taker) {
            taker.x = ball.x; taker.y = ball.y;
        }
        
        showEvent(setPieceTeam.name + " " + setPieceType + " kullanacak", 2000);
        return;
    }

    // === POSSESSION & PHYSICS-BASED TACKLING ===
    if (ball.owner) {
        ball.owner.hasBallTime++;
        // Dribbling: ball follows player with slight impulse lag
        const dribLag = 0.85;
        ball.x = ball.x * (1-dribLag) + ball.owner.x * dribLag;
        ball.y = ball.y * (1-dribLag) + ball.owner.y * dribLag;
        ball.z = 0; ball.vx = 0; ball.vy = 0; ball.vz = 0;
        ball.spinX = 0; ball.spinY = 0;
        ball.targetPlayer = null;
        ball.lastTouchedBy = ball.owner;
        
        // Collision-based tackling (mass * velocity)
        for (let i = players.length - 1; i >= 0; i--) {
            let opp = players[i];
            if (opp.team !== ball.owner.team && dist(opp, ball.owner) < 20 && opp.actionCooldown <= 0) {
                // Momentum: mass × speed
                const atkMomentum = ball.owner.mass * Math.hypot(ball.owner.vx, ball.owner.vy) + ball.owner.ozellikler.hiz * 0.5;
                const defMomentum = opp.mass * Math.hypot(opp.vx, opp.vy) + opp.ozellikler.defans * 0.8;
                const tackleRoll = Math.random() * 30;
                
                if (defMomentum + tackleRoll > atkMomentum) {
                    // Check foul
                    const foulChance = 0.15 + (Math.hypot(opp.vx, opp.vy) > 3 ? 0.15 : 0); // slide tackle = higher foul risk
                    if (Math.random() < foulChance) {
                        ball.owner.actionCooldown = 40;
                        opp.actionCooldown = 40;
                        stateMachine = "SET_PIECE";
                        setPieceTimer = 120;
                        setPieceTeam = ball.owner.team;
                        
                        const inBox = Math.abs(ball.y - opp.team.defendY) < 150 && Math.abs(ball.x - GAME_WIDTH/2) < 120;
                        setPieceType = inBox ? "PENALTI" : "FRİKİK";
                        
                        let eventMsg = `${setPieceType}! ${opp.ad} sert girdi.`;
                        if (Math.random() < 0.3) {
                            if (Math.random() < 0.1) {
                                eventMsg += ` 🟥 KIRMIZI KART!`;
                                players.splice(i, 1);
                            } else {
                                eventMsg += ` 🟨 SARI KART!`;
                            }
                        }
                        showEvent(eventMsg, 3000);
                        ball.vx = 0; ball.vy = 0; ball.vz = 0;
                        if (setPieceType === "PENALTI") {
                            ball.x = GAME_WIDTH/2;
                            ball.y = opp.team.defendY === 0 ? 110 : GAME_HEIGHT-110;
                        }
                        return;
                    } else {
                        // Clean tackle with push-back (collision physics)
                        const pushDir = normalize(ball.owner.x - opp.x, ball.owner.y - opp.y);
                        const pushForce = (defMomentum - atkMomentum) * 0.02;
                        ball.owner.vx += pushDir.x * pushForce;
                        ball.owner.vy += pushDir.y * pushForce;
                        
                        showEvent(Math.hypot(opp.vx, opp.vy) > 3 ? "Kayarak müdahale!" : "Omuz omuza!", 500);
                        ball.owner.actionCooldown = 25;
                        ball.owner = opp;
                        opp.state = 'WITH_BALL';
                        opp.hasBallTime = 0;
                        ball.lastTouchedBy = opp;
                        return;
                    }
                } else {
                    // Attacker wins: defender bounces off
                    const pushDir = normalize(opp.x - ball.owner.x, opp.y - ball.owner.y);
                    opp.vx += pushDir.x * 2;
                    opp.vy += pushDir.y * 2;
                    opp.actionCooldown = 15;
                }
            }
        }
        
    } else {
        // Interception: reach radius based on defans stat
        let bestClaim = null; let bestDist = 9999;
        players.forEach(p => {
            const reachRadius = 16 + (p.ozellikler.defans / 12);
            const d = dist(p, ball);
            if (d < reachRadius && ball.speed < 16 && p.actionCooldown <= 0 && d < bestDist) {
                bestDist = d; bestClaim = p;
            }
        });
        if (bestClaim) {
            ball.owner = bestClaim; bestClaim.state = 'WITH_BALL';
            bestClaim.hasBallTime = 0; ball.lastTouchedBy = bestClaim;
            ball.z = 0; ball.vz = 0;
        }
    }

    const teamPossession = getTeamWithBall();
    const markingAssignments = new Map();
    if (teamPossession) {
        const defendingTeam = teamPossession === team1 ? team2 : team1;
        buildMarkAssignments(defendingTeam, teamPossession).forEach((mark, defender) => {
            markingAssignments.set(defender, mark);
        });
    }

    // Player AI
    players.forEach(p => {
        const playerIsGK = isGoalkeeper(p);
        
        // Stamina logic
        if (p.stamina < 100 && p.state !== 'CHASE' && p.state !== 'WITH_BALL') {
            p.stamina += 0.05 + (p.ovr / 2000); // recover
        }
        
        let speedMult = (p.ozellikler.hiz / 100) * 4.0; // Base speed based on 'hiz'
        // Fatigue effect: drop to 50% speed if exhausted
        speedMult *= Math.max(0.5, p.stamina / 100); 

        if (p.actionCooldown > 0) p.actionCooldown--;

        if (p === ball.owner) {
            // DECISION ENGINE: HAS BALL (FM-Style)
            p.stamina -= 0.15; // dribbling tires faster
            if (p.stamina < 0) p.stamina = 0;
            
            const distToGoal = Math.abs(p.y - p.team.goalY);
            
            if (playerIsGK) {
                const gkHold = goalkeeperTarget(p);
                const gkDir = normalize(gkHold.x - p.x, gkHold.y - p.y);
                const gkDist = dist(p, gkHold);
                p.vx = gkDist > 6 ? gkDir.x * Math.min(speedMult * 0.45, 2.2) : 0;
                p.vy = gkDist > 6 ? gkDir.y * Math.min(speedMult * 0.45, 2.2) : 0;
                if (p.actionCooldown <= 0 && p.hasBallTime > 14) {
                    goalkeeperDistribute(p);
                }
                return;
            }

            if (p.actionCooldown <= 0) {
                let closeOpponents = 0;
                players.forEach(opp => {
                    if (opp.team !== p.team && dist(p, opp) < 58) closeOpponents++;
                });

                // 1. Shoot?
                if (distToGoal < 300) {
                    let pathClear = true;
                    if (distToGoal > 80) {
                        players.forEach(opp => {
                            if (opp.team !== p.team && dist(opp, p) < distToGoal && 
                                Math.abs(opp.x - p.x) < 40 && opp.y > Math.min(p.y, p.team.goalY) && opp.y < Math.max(p.y, p.team.goalY)) {
                                pathClear = false;
                            }
                        });
                    }
                    
                    // High probability to shoot if in box and clear, or just very close
                    const shotChance = distToGoal < 140 ? 0.75 : (distToGoal < 220 ? 0.35 : 0.10);
                    if (distToGoal < 115 || (pathClear && Math.random() < shotChance)) {
                        const errSut = (100 - p.ozellikler.sut) / 100;
                        const distFactor = distToGoal / 250;
                        const usePlase = distToGoal < 150 && Math.random() < 0.5;
                        
                        if (usePlase) {
                            const gX = GAME_WIDTH/2 + (Math.random() * 100 - 50);
                            const errX = (Math.random() * 150 - 75) * errSut;
                            const dir = normalize((gX + errX) - p.x, p.team.goalY - p.y);
                            const power = 10 + (p.ozellikler.sut / 18);
                            ball.vx = dir.x * power; ball.vy = dir.y * power;
                            ball.vz = 2 + Math.random() * 2;
                            ball.spinX = (Math.random() - 0.5) * 0.8;
                            ball.spinY = 0;
                            showEvent('🎯 Plase!', 800);
                        } else {
                            const gX = GAME_WIDTH/2 + (Math.random() * 80 - 40);
                            const totalErr = errSut + distFactor * 0.5;
                            const errX = (Math.random() * 400 - 200) * totalErr;
                            const dir = normalize((gX + errX) - p.x, p.team.goalY - p.y);
                            const power = 16 + (p.ozellikler.sut / 12);
                            ball.vx = dir.x * power; ball.vy = dir.y * power;
                            const strikePoint = Math.random();
                            if (strikePoint < 0.3) { ball.vz = 4 + Math.random() * 3; } 
                            else if (strikePoint < 0.6) { ball.vz = 1 + Math.random(); } 
                            else { ball.vz = 0; ball.spinX = (Math.random()-0.5) * 0.3; }
                            showEvent(distToGoal < 120 ? '🦵 Sert Şut!' : '🦵 Uzak Şut!', 800);
                        }
                        playKickSound(true);
                        ball.owner = null; p.actionCooldown = 40;
                        return;
                    }
                }
                
                // 2. Pass Evaluation (Intelligent FM style)
                if (p.hasBallTime > 22) {
                    let bestMate = null; let bestScore = -999;
                    players.forEach(m => {
                        if (m.team === p.team && m !== p) {
                            const d = dist(p, m);
                            if (d > 40 && d < 450) { // Valid pass range
                                let score = 0;
                                // Reward forward passes
                                const forwardDist = Math.abs(p.y - p.team.goalY) - Math.abs(m.y - p.team.goalY);
                                score += forwardDist * 0.4;
                                
                                // Penalize if an opponent is too close to the receiver
                                let oppNear = 0;
                                players.forEach(opp => { if (opp.team !== p.team && dist(m, opp) < 70) oppNear++; });
                                score -= oppNear * 60;
                                
                                // Penalize if passing lane is blocked
                                let blocked = false;
                                players.forEach(opp => {
                                    if (opp.team !== p.team && dist(p, opp) < d) {
                                        // Quick distance-to-line check
                                        const dot = ((opp.x - p.x)*(m.x - p.x) + (opp.y - p.y)*(m.y - p.y)) / (d*d);
                                        if (dot > 0 && dot < 1) {
                                            const projX = p.x + dot*(m.x - p.x);
                                            const projY = p.y + dot*(m.y - p.y);
                                            if (dist(opp, {x:projX, y:projY}) < 25) blocked = true;
                                        }
                                    }
                                });
                                if (blocked) score -= 100;
                                
                                if (score > bestScore) { bestScore = score; bestMate = m; }
                            }
                        }
                    });
                    
                    // If a good pass is found, OR forced to pass because pressed
                    let oppPressing = false;
                    players.forEach(opp => { if (opp.team !== p.team && dist(p, opp) < 40) oppPressing = true; });
                    
                    const shouldKeepDribbling = closeOpponents < 2 && distToGoal > 105 && p.hasBallTime < 95;
                    if (bestMate && !shouldKeepDribbling && (bestScore > 28 || (oppPressing && bestScore > -45) || p.hasBallTime > 95)) {
                        const errPas = (100 - p.ozellikler.pas) / 100;
                        const passDist = dist(p, bestMate);
                        const passSpeed = 12 + (p.ozellikler.pas / 20);
                        const eta = passDist / passSpeed;
                        
                        // Through-ball logic: if teammate is running forward, pass to space ahead
                        let predX = bestMate.x + bestMate.vx * eta;
                        let predY = bestMate.y + bestMate.vy * eta;
                        
                        const errX = (Math.random() * 150 - 75) * errPas;
                        const errY = (Math.random() * 150 - 75) * errPas;
                        const dir = normalize((predX + errX) - p.x, (predY + errY) - p.y);
                        
                        const pw = passSpeed + (Math.random() * 4 - 2) * errPas;
                        ball.vx = dir.x * pw; ball.vy = dir.y * pw;
                        ball.z = 0; ball.vz = 0; ball.spinX = 0; ball.spinY = 0;
                        ball.targetPlayer = bestMate;
                        playKickSound(true);
                        ball.owner = null; p.actionCooldown = 20;
                        return;
                    }
                }
            }
            
            // 3. Dribbling: first thought is to carry the ball toward goal.
            const goalDrive = normalize(GAME_WIDTH/2 - p.x, p.team.goalY - p.y);
            let dribbleDir = goalDrive;
            
            // Avoid nearby opponents
            let avoidVec = { x: 0, y: 0 };
            players.forEach(opp => {
                if (opp.team !== p.team) {
                    const d = dist(p, opp);
                    if (d < 80) {
                        avoidVec.x += (p.x - opp.x) / d;
                        avoidVec.y += (p.y - opp.y) / d;
                    }
                }
            });
            
            if (Math.hypot(avoidVec.x, avoidVec.y) > 0.1) {
                dribbleDir = normalize(goalDrive.x * 1.45 + avoidVec.x * 1.35, goalDrive.y * 1.45 + avoidVec.y * 1.35);
            } else {
                // Drive at goal, with a slight center lane correction.
                dribbleDir = normalize(goalDrive.x + (GAME_WIDTH/2 - p.x)*0.006, goalDrive.y);
            }
            
            p.vx = dribbleDir.x * speedMult * 0.92;
            p.vy = dribbleDir.y * speedMult * 0.92;
            
        } else {
            // NOT BALL OWNER
            let targetX = p.baseX;
            let targetY = p.baseY;
            
            // Goalkeeper specific logic
            if (playerIsGK) {
                const gkTarget = goalkeeperTarget(p);
                targetX = gkTarget.x;
                targetY = gkTarget.y;
                p.state = Math.abs(ball.y - p.team.defendY) < 160 && ball.speed > 4 ? 'GK_DIVE' : 'GK_READY';
            } else {
                // === FM-STYLE TACTICAL ZONAL AI ===
                const ballRelativeX = (ball.x - GAME_WIDTH/2) / (GAME_WIDTH/2);
                const ballRelativeY = ball.y / GAME_HEIGHT;
                const shiftX = ballRelativeX * (isForward(p) ? 45 : 62);
                targetX = p.baseX + shiftX;

                const isAttacking = teamPossession === p.team;
                const ballInMyHalf = isInOwnHalf(p.team, ball.y);
                const ownHalf = ownHalfBounds(p.team, 36);
                
                if (isAttacking) {
                    if (ball.targetPlayer === p) {
                        targetX = ball.x + ball.vx*6;
                        targetY = ball.y + ball.vy*6;
                        p.state = 'CHASE';
                    } else {
                        p.state = 'SUPPORT';
                        const behindBallY = ball.y - p.team.dirY * 85;
                        const aheadBallY = ball.y + p.team.dirY * 105;

                        if (isDefender(p)) {
                            targetY = p.baseY + p.team.dirY * 80;
                            targetY = p.team.defendY === 0
                                ? Math.min(MID_Y + 45, Math.max(ownHalf.minY, behindBallY - 55))
                                : Math.max(MID_Y - 45, Math.min(ownHalf.maxY, behindBallY + 55));
                        } else if (isMidfielder(p)) {
                            targetY = (p.baseY * 0.45) + (behindBallY * 0.55);
                            targetY = Math.max(90, Math.min(GAME_HEIGHT - 90, targetY));
                        } else {
                            targetY = aheadBallY;
                            const offsideY = p.team.goalY - p.team.dirY * 55;
                            targetY = p.team.dirY === -1
                                ? Math.max(offsideY, targetY)
                                : Math.min(offsideY, targetY);
                            targetX += (Math.random()-0.5) * 26;
                        }
                    }
                } else if (teamPossession && !isAttacking) {
                    const dToBall = dist(p, ball);
                    const markedOpp = markingAssignments.get(p);
                    const teamDistances = players
                        .filter(m => m.team === p.team && !isGoalkeeper(m))
                        .map(m => ({ m, d: dist(m, ball) }))
                        .sort((a,b)=>a.d-b.d);
                    const pressRank = teamDistances.findIndex(entry => entry.m === p) + 1;
                    const canPress = pressRank === 1
                        && (ballInMyHalf || (!isDefender(p) && dToBall < 185));
                    
                    if (canPress) {
                        targetX = ball.x;
                        targetY = ball.y;
                        p.state = 'CHASE';
                        p.stamina -= 0.08;
                    } else {
                        p.state = 'IDLE';
                        const goalSide = p.team.defendY === 0 ? -1 : 1;
                        const roleOffset = isDefender(p) ? 65 : (isMidfielder(p) ? 155 : 265);
                        if (ballInMyHalf) {
                            targetY = ball.y + goalSide * roleOffset;
                        } else {
                            const depth = isDefender(p) ? 120 : (isMidfielder(p) ? 250 : 360);
                            targetY = p.team.defendY === 0 ? depth : GAME_HEIGHT - depth;
                        }
                        targetY = Math.max(ownHalf.minY, Math.min(ownHalf.maxY, targetY));

                        if (markedOpp) {
                            const goalCenter = {x: GAME_WIDTH/2, y: p.team.defendY};
                            const blockDir = normalize(markedOpp.x - goalCenter.x, markedOpp.y - goalCenter.y);
                            const markGap = isDefender(p) ? 34 : 44;
                            targetX = markedOpp.x - blockDir.x * markGap;
                            targetY = markedOpp.y - blockDir.y * markGap;
                            targetY = Math.max(ownHalf.minY, Math.min(ownHalf.maxY, targetY));
                        } else {
                            let nearestOpp = null; let dOpp = 999;
                            players.forEach(opp => {
                                if (opp.team !== p.team && dist(opp, p) < dOpp) { dOpp = dist(opp,p); nearestOpp = opp; }
                            });
                            if (nearestOpp && dOpp < 160) {
                                const goalCenter = {x: GAME_WIDTH/2, y: p.team.defendY};
                                const blockDir = normalize(nearestOpp.x - goalCenter.x, nearestOpp.y - goalCenter.y);
                                targetX = nearestOpp.x - blockDir.x * 42;
                                targetY = Math.max(ownHalf.minY, Math.min(ownHalf.maxY, nearestOpp.y - blockDir.y * 42));
                            }
                        }
                    }
                } else {
                    let myTeamDist = [];
                    players.forEach(m => { if(m.team === p.team) myTeamDist.push({m:m, d:dist(m,ball)}); });
                    myTeamDist.sort((a,b)=>a.d - b.d);
                    const shouldChaseLoose = myTeamDist[0].m === p
                        || (myTeamDist.length > 1 && myTeamDist[1].m === p && (!isDefender(p) || ballInMyHalf));
                    if (shouldChaseLoose) {
                        targetX = ball.x + ball.vx * 3; 
                        targetY = ball.y + ball.vy * 3;
                        p.state = 'CHASE';
                    } else {
                        targetY = p.baseY + ((ballRelativeY - 0.5) * 150);
                        if (isDefender(p)) {
                            targetY = Math.max(ownHalf.minY, Math.min(ownHalf.maxY, targetY));
                        }
                        p.state = 'IDLE';
                    }
                }

                const target = clampPitch(targetX, targetY, 18);
                targetX = target.x;
                targetY = target.y;
            }

            // Move towards target
            const dir = normalize(targetX - p.x, targetY - p.y);
            const d = dist(p, {x:targetX, y:targetY});
            
            if (d > 10) {
                let curSpeed = p.state === 'CHASE' ? speedMult : speedMult * 0.6;
                if (p.state === 'GK_DIVE') {
                    // GK dive speed is CRITICAL - based on kaleci XP (range 4-11 px/frame)
                    curSpeed = 4 + (p.ozellikler.kaleci / 100) * 7.0;
                }
                p.vx = dir.x * curSpeed;
                p.vy = dir.y * curSpeed;
            } else {
                p.vx *= 0.8; p.vy *= 0.8; // smooth stop
            }
        }

        // Apply physics
        p.x += p.vx; p.y += p.vy;
        
        // Bounds
        if(p.x < 15) p.x=15; if(p.x > GAME_WIDTH-15) p.x=GAME_WIDTH-15;
        if(p.y < 15) p.y=15; if(p.y > GAME_HEIGHT-15) p.y=GAME_HEIGHT-15;
        if (playerIsGK) {
            const gkSafe = clampGoalkeeperArea(p, p.x, p.y);
            p.x = gkSafe.x;
            p.y = gkSafe.y;
        }
    });
    separatePlayers();
    updateDebugPanel();
}

function draw() {
    // Grass stripes
    for (let i=0; i<10; i++) {
        ctx.fillStyle = i%2===0 ? '#276749' : '#2f855a';
        ctx.fillRect(0, i*(GAME_HEIGHT/10), GAME_WIDTH, GAME_HEIGHT/10);
    }
    
    // Pitch Lines
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 3; ctx.beginPath();
    // Center line & circle
    ctx.moveTo(0, GAME_HEIGHT/2); ctx.lineTo(GAME_WIDTH, GAME_HEIGHT/2);
    ctx.arc(GAME_WIDTH/2, GAME_HEIGHT/2, 60, 0, Math.PI*2);
    // Penalty boxes
    ctx.rect(GAME_WIDTH/2 - 150, 0, 300, 130);
    ctx.rect(GAME_WIDTH/2 - 150, GAME_HEIGHT-130, 300, 130);
    // Goal areas
    ctx.rect(GAME_WIDTH/2 - 60, 0, 120, 40);
    ctx.rect(GAME_WIDTH/2 - 60, GAME_HEIGHT-40, 120, 40);
    ctx.stroke();

    // Players
    players.forEach(p => {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath(); ctx.arc(p.x+3, p.y+3, 12, 0, Math.PI*2); ctx.fill();
        
        // Body
        ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2);
        ctx.fillStyle = p.team.color; ctx.fill();
        
        // Outline (fatigue indication - dims if tired)
        let alpha = 0.4 + (p.stamina/100)*0.6;
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 2; ctx.stroke();
        
        // Info
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.numara, p.x, p.y);
        
        ctx.font = 'bold 12px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillText(p.ad, p.x, p.y + 22);
        
        // Rating Badge
        ctx.fillStyle = p.ovr > 80 ? '#fbbf24' : '#a7f3d0';
        ctx.font = '10px monospace';
        ctx.fillText(`⚡${p.ovr}`, p.x, p.y - 18);
        
        // Stamina bar (small line below name)
        ctx.fillStyle = p.stamina > 50 ? '#4ade80' : (p.stamina > 20 ? '#facc15' : '#ef4444');
        ctx.fillRect(p.x - 10, p.y + 30, 20 * (p.stamina/100), 3);
    });

    // Ball shadow (on ground)
    const shadowSize = Math.max(3, 7 - ball.z * 0.15);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.arc(ball.x + 2, ball.y + 2 + ball.z * 0.4, shadowSize, 0, Math.PI*2); ctx.fill();
    
    // Ball (lifted by z)
    const ballDrawY = ball.y - ball.z;
    const ballSize = Math.max(5, 7 + ball.z * 0.15);
    ctx.beginPath(); ctx.arc(ball.x, ballDrawY, ballSize, 0, Math.PI*2);
    ctx.fillStyle = ball.z > 3 ? '#fde047' : '#fff'; // yellow when airborne
    ctx.fill();
    ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.stroke();
    
    // Spin indicator when ball has curve
    const spinMag = Math.hypot(ball.spinX || 0, ball.spinY || 0);
    if (spinMag > 0.05 && ball.z > 1) {
        ctx.strokeStyle = 'rgba(255,200,0,0.5)'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ball.x, ballDrawY);
        ctx.lineTo(ball.x + (ball.spinX||0) * 40, ballDrawY + (ball.spinY||0) * 40);
        ctx.stroke();
    }
}

function gameLoop() {
    try {
        update();
        draw();
    } catch (e) {
        console.error("Game loop error:", e);
        // Continue animation even if error happens to prevent freeze
    }
    requestAnimationFrame(gameLoop);
}
// ========== HALFTIME SYSTEM ==========
let htInterval = null;
let htSecondsLeft = 120; // 2 minutes

function startHalftime() {
    stateMachine = "HALFTIME";
    htTeamReady = false;
    htSecondsLeft = 120;
    
    // Show overlay
    const overlay = document.getElementById('halftime-overlay');
    overlay.classList.add('active');
    document.getElementById('ht-score').textContent = `${score1} - ${score2}`;
    document.getElementById('ht-ready-btn').style.display = '';
    document.getElementById('ht-ready-btn').textContent = '✅ Taktikleri Onayla (2. Yarıya Hazırım)';
    document.getElementById('ht-status').textContent = 'Taktik değişikliklerinizi yapın, süre dolunca 2. yarı başlar.';
    updateHtTimer();
    
    // Start countdown
    htInterval = setInterval(() => {
        htSecondsLeft--;
        updateHtTimer();
        if (htSecondsLeft <= 0) {
            endHalftime();
        }
    }, 1000);
}

function updateHtTimer() {
    const min = Math.floor(htSecondsLeft / 60);
    const sec = htSecondsLeft % 60;
    document.getElementById('ht-countdown').textContent = `${min}:${sec.toString().padStart(2,'0')}`;
    // Change color as time runs out
    const el = document.getElementById('ht-countdown');
    el.style.color = htSecondsLeft <= 10 ? '#ef4444' : (htSecondsLeft <= 30 ? '#f59e0b' : '#22c55e');
}

function openTaktik() {
    // Open tactic screen in new window (parent page's tactic URL)
    const taktikUrl = "{{ url_for('ogrenci_taktik') }}";
    window.open(taktikUrl, "TaktikEkrani", "width=800,height=700,resizable=yes");
}

function htReady() {
    htTeamReady = true;
    document.getElementById('ht-ready-btn').style.display = 'none';
    document.getElementById('ht-status').textContent = `✅ Hazırsınız! Süre dolmasını bekliyorsunuz... (${htSecondsLeft}s)`;
    
    // If less than 10 seconds left, start immediately
    if (htSecondsLeft <= 10) {
        endHalftime();
    }
}

function endHalftime() {
    clearInterval(htInterval);
    htInterval = null;
    
    // Hide overlay
    document.getElementById('halftime-overlay').classList.remove('active');
    
    // Mark second half
    isSecondHalf = true;
    stateMachine = "PLAYING";
    
    // Reset positions for 2nd half (swap sides)
    players.forEach(p => {
        p.baseX = GAME_WIDTH - p.baseX;
        p.baseY = GAME_HEIGHT - p.baseY;
        p.x = p.baseX; p.y = p.baseY;
        p.vx = 0; p.vy = 0;
        p.stamina = 100;
        p.state = 'IDLE';
        p.actionCooldown = 0;
    });
    
    // Swap team directions
    [team1.dirY, team2.dirY] = [team2.dirY, team1.dirY];
    [team1.goalY, team2.goalY] = [team2.goalY, team1.goalY];
    [team1.defendY, team2.defendY] = [team2.defendY, team1.defendY];
    
    // Ball to center
    ball.x = GAME_WIDTH/2; ball.y = GAME_HEIGHT/2;
    ball.vx = 0; ball.vy = 0; ball.owner = null; ball.targetPlayer = null;
    
    showEvent("2. Yarı Başlıyor!", 3000);
}

loadData();
