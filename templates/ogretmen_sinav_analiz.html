{% extends "base.html" %}
{% block title %}Sınav Analizi{% endblock %}

{% block body %}
<main class="max-w-7xl mx-auto px-3 sm:px-4 py-4 pb-24 text-slate-800">
  <header class="mb-4 rounded-2xl border border-amber-200 bg-gradient-to-br from-amber-50 to-white p-4 shadow-sm">
    <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
      <div>
        <h1 class="text-xl sm:text-2xl font-black text-amber-900 tracking-tight">ECO Sınav Analiz</h1>
        <p class="text-xs sm:text-sm text-slate-600 mt-1 max-w-3xl">
          Okul, öğretmen ve öğrenci bilgileri ECO’dan hazır gelir. Sadece sınıf, ders, sınav bilgisi,
          TYMM öğrenme çıktıları ve puan alanlarını seçip raporu yazdırabilirsiniz.
        </p>
      </div>
      <a href="{{ url_for('dashboard') }}" class="shrink-0 inline-flex items-center justify-center rounded-xl bg-okul-800 text-white text-xs font-bold px-4 py-2 hover:bg-okul-900">← Ana menü</a>
    </div>
  </header>

  <nav class="flex flex-wrap gap-1 mb-3 sticky top-14 z-20 bg-slate-100/95 backdrop-blur py-2 -mx-1 px-1 border-b border-slate-200" id="tabs"></nav>

  <section id="panel-bilgi" class="panel space-y-3"></section>
  <section id="panel-tur" class="panel hidden space-y-3"></section>
  <section id="panel-sinif" class="panel hidden space-y-3"></section>
  <section id="panel-soru" class="panel hidden space-y-3"></section>
  <section id="panel-not" class="panel hidden space-y-3"></section>
  <section id="panel-rapor" class="panel hidden space-y-3"></section>
  <section id="panel-yedek" class="panel hidden space-y-3"></section>
</main>

<script>
(function () {
  const LS_KEY = "eco_sinav_analiz_v2";
  const API_SINIF = (id) => "/api/sinav-analiz/sinif/" + id;
  const API_MUFREDAT = "/api/curriculum/drive-kazanimlari";
  const SINIFLAR = {{ siniflar | default([]) | tojson }};
  const DERSLER = {{ dersler | default([]) | tojson }};
  const DEFAULT_OKUL = {{ (okul_adi or "Erenler Cumhuriyet Ortaokulu") | tojson }};
  const DEFAULT_MUDUR = "ADEM AKGÜL";
  const OGRETMEN_ADI = {{ (ogretmen_adi or "") | tojson }};

  const TUR_RAPOR_BASLIK = {
    yazili: "YAZILI SINAV ÖĞRENME ÇIKTISI ANALİZİ",
    dinleme: "DİNLEME SINAVI ÖĞRENME ÇIKTISI ANALİZİ",
    konusma: "KONUŞMA SINAVI ÖĞRENME ÇIKTISI ANALİZİ",
  };

  const TAB_DEF = [
    { id: "bilgi", icon: "🏠", label: "Bilgi girişi" },
    { id: "tur", icon: "⚙️", label: "Analiz türü" },
    { id: "sinif", icon: "🏫", label: "Sınıf listesi" },
    { id: "soru", icon: "📝", label: "Öğrenme çıktıları" },
    { id: "not", icon: "🎓", label: "Öğrenci notları" },
    { id: "rapor", icon: "🖨️", label: "Rapor" },
    { id: "yedek", icon: "💾", label: "Veri / yedek" },
  ];

  const ANALIZ_LABEL = {
    genel: "1. Genel dersler analizi",
    tde: "2. TDE analizi",
    yabanci: "3. Yabancı dil",
    turkce: "4. Türkçe",
  };

  let curriculumCache = null;

  function uid(prefix) {
    return (prefix || "x") + "_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
  }

  function defaultState() {
    return {
      _v: 3,
      meta: {
        okulAdi: DEFAULT_OKUL,
        ders: DERSLER[0] || "",
        ogretmen: OGRETMEN_ADI,
        mudur: DEFAULT_MUDUR,
        sinavAdi: "2. Dönem 1. Yazılı",
        egitimYili: "2025-2026",
        analizTuru: "genel",
        sinifId: SINIFLAR[0] ? SINIFLAR[0].id : null,
        sinifAdi: SINIFLAR[0] ? SINIFLAR[0].sinif_adi : "",
        sinifMevcudu: "",
        sinavaKatilan: "",
        basariEsik: "50",
        zayifKazanimEsik: "60",
        degerlendirmeEk: (
          "Hata yapılan soruların ait olduğu öğrenme çıktılarının tekrarı için 2 ders saati süre ayrılmıştır. " +
          "Sınav soruları sınıfta çözülerek kağıtlar öğrencilere dağıtılmış ve hatalarını görmeleri sağlanmıştır. " +
          "Bu belirtilen konularla ilgili ödevlendirme yapılmıştır. Ayrıca her öğrencinin tek tek eksik öğrenme çıktısı veya " +
          "öğrenme çıktıları tespit edilerek \"Öğrenci Bazlı Sınav Analizi\" hazırlanıp bu rapora eklenmiştir."
        ),
      },
      ogrenciler: [],
      sorular: { yazili: [], dinleme: [], konusma: [] },
      notlar: {},
    };
  }

  let state = defaultState();
  let saveTid = null;
  let activeTab = "bilgi";

  function mergeMetaDefaults() {
    const d = defaultState().meta;
    Object.keys(d).forEach((k) => {
      if (state.meta[k] === undefined || state.meta[k] === null) state.meta[k] = d[k];
    });
    state.meta.mudur = DEFAULT_MUDUR;
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const o = JSON.parse(raw);
      if (!o || typeof o !== "object") return;
      state = Object.assign(defaultState(), o);
      if (!state.sorular) state.sorular = { yazili: [], dinleme: [], konusma: [] };
      ["yazili", "dinleme", "konusma"].forEach((k) => {
        if (!Array.isArray(state.sorular[k])) state.sorular[k] = [];
      });
      if (!state.notlar || typeof state.notlar !== "object") state.notlar = {};
      mergeMetaDefaults();
      state.ogrenciler.forEach((ogr) => {
        if (ogr.katilmadi == null) ogr.katilmadi = false;
      });
    } catch (e) {
      console.warn(e);
      state = defaultState();
    }
  }

  function scheduleSave() {
    clearTimeout(saveTid);
    saveTid = setTimeout(() => {
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(state));
        const hist = JSON.parse(localStorage.getItem(LS_KEY + "_hist") || "[]");
        hist.unshift({ t: new Date().toISOString(), sinav: state.meta.sinavAdi || "—" });
        localStorage.setItem(LS_KEY + "_hist", JSON.stringify(hist.slice(0, 12)));
      } catch (e) {
        alert("Kaydedilemedi: " + e.message);
      }
    }, 350);
  }

  function studentKey(o) {
    if (o.dbId != null) return "id_" + o.dbId;
    return "m_" + (o.sira || 0) + "_" + String(o.adSoyad || "").slice(0, 12);
  }

  function ensureNotlar(key) {
    if (!state.notlar[key]) state.notlar[key] = {};
    return state.notlar[key];
  }

  function flatQuestions() {
    const out = [];
    ["yazili", "dinleme", "konusma"].forEach((tur) => {
      (state.sorular[tur] || []).forEach((q, idx) => {
        out.push({ tur, q, idx, colId: tur[0] + "_" + q.id });
      });
    });
    return out;
  }

  function hesapDetay() {
    const fq = flatQuestions();
    const maxTop = fq.reduce((s, c) => s + c.q.puan, 0);
    const basEsik = parseFloat(state.meta.basariEsik) || 50;
    const zayifEsik = parseFloat(state.meta.zayifKazanimEsik) || 60;

    const katilmayan = state.ogrenciler.filter((o) => o.katilmadi).length;
    const mevcutAuto = state.ogrenciler.length;
    const mevcut = parseInt(state.meta.sinifMevcudu, 10) || mevcutAuto;

    const aktifOgr = state.ogrenciler.filter((o) => !o.katilmadi);
    const totListe = [];
    aktifOgr.forEach((o) => {
      const sk = studentKey(o);
      let tot = 0;
      let any = false;
      fq.forEach((c) => {
        const v = state.notlar[sk] && state.notlar[sk][c.colId];
        if (v != null && v !== "" && !isNaN(Number(v))) {
          tot += Number(v);
          any = true;
        }
      });
      totListe.push({ o, sk, tot, any });
    });

    let katSay = parseInt(state.meta.sinavaKatilan, 10);
    if (!katSay || katSay < 1) katSay = totListe.filter((x) => x.any).length || aktifOgr.length || 1;

    const puanlar = totListe.filter((x) => x.any).map((x) => x.tot);
    const ortPuan = puanlar.length ? puanlar.reduce((a, b) => a + b, 0) / puanlar.length : 0;
    const basarililar = totListe.filter((x) => x.any && x.tot >= basEsik).length;
    const basarisiz = Math.max(0, totListe.filter((x) => x.any).length - basarililar);
    const basariYuzde = katSay > 0 ? Math.round((basarililar / katSay) * 1000) / 10 : 0;

    let std = 0;
    if (puanlar.length > 1) {
      const m = ortPuan;
      const v = puanlar.reduce((s, t) => s + (t - m) * (t - m), 0) / (puanlar.length - 1);
      std = Math.sqrt(v);
    }

    const qStats = fq.map((c) => {
      const vals = [];
      aktifOgr.forEach((o) => {
        const sk = studentKey(o);
        const v = state.notlar[sk] && state.notlar[sk][c.colId];
        if (v != null && v !== "" && !isNaN(Number(v))) vals.push(Number(v));
      });
      const ort = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
      const basariSoru = c.q.puan > 0 ? Math.round((ort / c.q.puan) * 1000) / 10 : 0;
      return Object.assign({}, c, { ort, basariSoru, n: vals.length });
    });

    const zayifListe = qStats.filter((q) => q.n > 0 && q.basariSoru < zayifEsik);

    const ogrenciZayif = state.ogrenciler.map((o) => {
      const sk = studentKey(o);
      if (o.katilmadi) return { o, sk, items: [], toplam: null };
      const items = [];
      fq.forEach((c) => {
        const max = c.q.puan;
        const v = state.notlar[sk] && state.notlar[sk][c.colId];
        const got = v != null && v !== "" && !isNaN(Number(v)) ? Number(v) : null;
        if (got === null || got < max) {
          items.push({
            soruEtiketi: `${TUR_RAPOR_BASLIK[c.tur] || c.tur} ${c.idx + 1}. soru`,
            metin: soruAnalizMetni(c.q),
            alinan: got,
            tamPuan: max,
          });
        }
      });
      let toplam = 0;
      fq.forEach((c) => {
        const v = state.notlar[sk] && state.notlar[sk][c.colId];
        if (v != null && v !== "" && !isNaN(Number(v))) toplam += Number(v);
      });
      return { o, sk, items, toplam: aktifOgr.includes(o) ? toplam : null };
    });

    const minP = puanlar.length ? Math.min(...puanlar) : 0;
    const maxP = puanlar.length ? Math.max(...puanlar) : 0;

    return {
      fq,
      maxTop,
      mevcut,
      katSay,
      katilmayan,
      ortPuan,
      basariYuzde,
      std,
      basEsik,
      zayifEsik,
      basarililar,
      basarisiz,
      qStats,
      zayifListe,
      ogrenciZayif,
      minP,
      maxP,
    };
  }

  function kisaMetin(s, n) {
    s = (s || "").trim();
    if (s.length <= n) return s;
    return s.slice(0, Math.max(0, n - 1)) + "…";
  }

  function soruAnalizMetni(q) {
    const parcalar = [];
    if (q.konu) parcalar.push("Konu/İçerik: " + q.konu);
    if (q.metin) parcalar.push("Öğrenme Çıktısı: " + q.metin);
    return parcalar.join(" | ") || "(Tanımsız öğrenme çıktısı)";
  }

  function destekCalismaMetni(it) {
    const puanBilgisi = it.alinan == null ? "puan girilmediği" : `${it.alinan}/${it.tamPuan} puan aldığı`;
    return `${it.soruEtiketi} için beklenen öğrenme çıktısını tam gösteremediği (${puanBilgisi}) için öğrenciye konu tekrarı, örnek soru çözümü, pekiştirme ödevi ve kısa kontrol çalışması verilmiştir.`;
  }

  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function escAttr(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;");
  }

  function buildFormalRaporHtml() {
    const H = hesapDetay();
    const m = state.meta;
    const okulUst = String(m.okulAdi || "").toUpperCase();
    const turEtiket = {
      yazili: "YAZILI SINAV",
      dinleme: "DİNLEME",
      konusma: "KONUŞMA",
    };

    function notGirildiMi() {
      const aktif = state.ogrenciler.filter((o) => !o.katilmadi);
      const fq2 = flatQuestions();
      return aktif.some((o) => {
        const sk = studentKey(o);
        return fq2.some((c) => {
          const v = state.notlar[sk] && state.notlar[sk][c.colId];
          return v != null && v !== "" && !isNaN(Number(v));
        });
      });
    }
    const hasSoru = H.fq.length > 0;
    const hasNot = notGirildiMi();
    const enYuksekStr = hasSoru && hasNot ? String(H.maxP) : "—";
    const enDusukStr = hasSoru && hasNot ? String(H.minP) : "—";
    const istatHtml = `
      <tr><td>Sınıf Mevcudu</td><td>${H.mevcut}</td></tr>
      <tr><td>Sınava Katılan</td><td>${H.katSay}</td></tr>
      <tr><td>Ort. Puan</td><td>${hasSoru && hasNot ? H.ortPuan.toFixed(2) : "—"}</td></tr>
      <tr><td>Başarı %</td><td>${hasSoru ? "%" + H.basariYuzde : "—"}</td></tr>
      <tr><td>Std. Sapma</td><td>${hasSoru && hasNot ? (H.std ? H.std.toFixed(2) : "0.00") : "—"}</td></tr>
      <tr><td>Max. Puan</td><td>${enYuksekStr}</td></tr>
      <tr><td>Min. Puan</td><td>${enDusukStr}</td></tr>
      <tr><td>Sınav Üst Sınırı (Toplam)</td><td>${H.maxTop || "—"}</td></tr>
    `;

    const kazanimBloklar = ["yazili", "dinleme", "konusma"].map((tur) => {
      const sorular = H.qStats.filter((x) => x.tur === tur);
      if (!sorular.length) return "";
      let no = 0;
      const satirlar = sorular.map((q) => {
        no++;
        return `<tr>
          <td style="text-align:center">${no}</td>
          <td>${esc(q.q.konu || "")}</td>
          <td>${esc(q.q.metin || "")}</td>
          <td style="text-align:center">${q.q.puan}</td>
          <td style="text-align:center">${q.n ? q.ort.toFixed(2) : "—"}</td>
          <td style="text-align:center">${q.n ? "%" + q.basariSoru : "—"}</td>
        </tr>`;
      }).join("");
      return `<h2 style="font-size:13pt;margin:16px 0 8px">${TUR_RAPOR_BASLIK[tur] || tur}</h2>
        <table><thead><tr><th>No</th><th>Konu/İçerik Çerçevesi</th><th>Öğrenme Çıktısı</th><th>Puan</th><th>Ort.</th><th>Başarı %</th></tr></thead>
        <tbody>${satirlar}</tbody></table>`;
    }).join("");

    const zayifTekil = [];
    const gordu = new Set();
    H.zayifListe.forEach((q) => {
      const metin = soruAnalizMetni(q.q);
      const anahtar = metin + "_" + q.basariSoru;
      if (gordu.has(anahtar)) return;
      gordu.add(anahtar);
      zayifTekil.push(`- [${turEtiket[q.tur] || q.tur}] ${metin} (%${q.basariSoru})`);
    });

    const degerParagraf = `Yapılan ortak sınav sonucu ${esc(m.sinifAdi || "—")} sınıfının (Sınava katılan ${H.katSay} öğrenci üzerinden) genel ortalaması ${H.ortPuan ? H.ortPuan.toFixed(2) : "—"} olarak hesaplanmıştır. Sınavda ${H.basarililar} öğrenci başarılı olurken, ${H.basarisiz} öğrenci başarısız olmuştur.`;

    const zayifBlock = zayifTekil.length
      ? `<p><b>Eksik Öğrenme Çıktıları:</b></p><ul>${zayifTekil.map((l) => "<li>" + esc(l) + "</li>").join("")}</ul><p>olarak tespit edilmiştir.</p>`
      : "<p><b>Eksik öğrenme çıktısı:</b> Belirlenen eşiğin altında soru bulunmuyor veya not girilmemiş.</p>";

    const ek = (m.degerlendirmeEk || "").trim()
      ? `<p style="margin-top:10px;white-space:pre-wrap">${esc(m.degerlendirmeEk)}</p>`
      : `<p style="margin-top:10px">Eksiklerin giderilmesi için tekrar ve ödevlendirme planlanmıştır.</p>`;

    const sayfa1 = `
      <div class="sayfa">
        <h1 style="text-align:center;font-size:15pt;margin-bottom:12px">SINAV ANALİZİ VE DEĞERLENDİRME RAPORU</h1>
        <table class="ust">
          <tr><td><b>Okul:</b> ${esc(okulUst)}</td><td><b>Sınıf:</b> ${esc(m.sinifAdi || "—")}</td></tr>
          <tr><td><b>Ders:</b> ${esc((m.ders || "").toUpperCase())}</td><td><b>Öğretmen:</b> ${esc((m.ogretmen || "").toUpperCase())}</td></tr>
          <tr><td><b>Sınav:</b> ${esc(m.sinavAdi || "—")}</td><td><b>Yıl:</b> ${esc(m.egitimYili || "—")}</td></tr>
        </table>
        <table class="ozet"><tbody>${istatHtml}</tbody></table>
        ${kazanimBloklar}
        <h3 style="font-size:12pt;margin:14px 0 6px">DEĞERLENDİRME:</h3>
        <p style="text-align:justify;line-height:1.45">${degerParagraf}</p>
        ${zayifBlock}
        ${ek}
        <div class="imza">
          <div><b>${esc(m.ogretmen || "")}</b><br/>Ders Öğretmeni</div>
          <div><b>${esc(m.mudur || "")}</b><br/>Okul Müdürü</div>
        </div>
      </div>`;

    const ogrSatir = H.ogrenciZayif.map((r, i) => {
      if (r.o.katilmadi) {
        return `<tr><td style="text-align:center">${esc(r.o.ogrNo)}</td><td>${esc(r.o.adSoyad)}</td><td style="text-align:center">G</td><td>—</td><td>—</td></tr>`;
      }
      const pu = r.toplam != null && r.toplam !== "" ? String(r.toplam) : "—";
      const eksikler = r.items.length
        ? r.items.map((it) => `• ${esc(it.soruEtiketi)}: ${esc(kisaMetin(it.metin, 86))}`).join("<br/>")
        : "—";
      const destekler = r.items.length
        ? r.items.map((it) => `• ${esc(destekCalismaMetni(it))}`).join("<br/>")
        : "—";
      return `<tr><td style="text-align:center">${esc(r.o.ogrNo)}</td><td>${esc(r.o.adSoyad)}</td><td style="text-align:center">${pu}</td><td style="font-size:10px">${eksikler || "—"}</td><td style="font-size:10px">${destekler || "—"}</td></tr>`;
    }).join("");

    const sayfa2 = `
      <div class="sayfa break">
        <h2 style="text-align:center;font-size:14pt">${esc(m.sinifAdi || "—")} ÖĞRENCİ BAZLI SINAV ANALİZİ</h2>
        <table><thead><tr><th>No</th><th>Öğrenci</th><th>PUAN</th><th>Eksik Öğrenme Çıktıları</th><th>Verilen Eğitim / Ödev / Destek Çalışması</th></tr></thead>
        <tbody>${ogrSatir}</tbody></table>
      </div>`;

    const css = `
      body{font-family:'Times New Roman',Times,serif;margin:14mm;color:#000;font-size:11pt}
      table{border-collapse:collapse;width:100%;margin:8px 0;font-size:10pt}
      th,td{border:1px solid #333;padding:5px 6px;vertical-align:top}
      th{background:#e8e8e8;font-weight:bold}
      .ust td{width:50%;padding:4px 6px;border:1px solid #333}
      .ozet td{border:1px solid #333;padding:4px 8px}
      .ozet tr td:first-child{font-weight:bold;width:42%}
      .imza{display:flex;justify-content:space-between;margin-top:28px;text-align:center}
      .imza div{width:40%}
      .sayfa{page-break-inside:avoid}
      .break{page-break-before:always}
      @media print{.no-print{display:none}}
    `;

    return `<!DOCTYPE html><html lang="tr"><head><meta charset="utf-8"/><title>Analiz Raporu</title><style>${css}</style></head><body>${sayfa1}${sayfa2}</body></html>`;
  }

  let soruPanelTur = "yazili";
  let mufredatFilter = "";
  let mufredatSeciliTema = "";
  let mufredatSeciliKonu = "";

  async function fetchCurriculum() {
    if (curriculumCache) return curriculumCache;
    const r = await fetch(API_MUFREDAT, { credentials: "same-origin" });
    if (!r.ok) throw new Error("Müfredat yüklenemedi (" + r.status + ")");
    curriculumCache = await r.json();
    return curriculumCache;
  }

  function setMeta(k, v) {
    if (k === "mudur") v = DEFAULT_MUDUR;
    state.meta[k] = v;
    scheduleSave();
  }

  function syncSinifFromSelect() {
    const id = state.meta.sinifId;
    const row = SINIFLAR.find((s) => s.id === id);
    state.meta.sinifAdi = row ? row.sinif_adi : "";
    scheduleSave();
  }

  function curriculumDersAdi(ders) {
    if (ders === "T.C. İnkılap Tarihi") return "T.C. İnkılap Tarihi ve Atatürkçülük";
    return ders || "";
  }

  function curriculumTemaEtiketi(tema) {
    return String(tema || "").replace(/^Drive\s*·\s*/i, "").trim();
  }

  function curriculumBloklar(ders) {
    const dersler = (curriculumCache && curriculumCache.dersler) || {};
    return ders ? (dersler[ders] || []) : [];
  }

  function curriculumKonuBol(baslik) {
    const parcalar = String(baslik || "").split(/\s*·\s*/).map((p) => p.trim()).filter(Boolean);
    if (parcalar.length >= 2) {
      return { tema: parcalar[0], icerik: parcalar.slice(1).join(" · ") };
    }
    const tek = parcalar[0] || String(baslik || "").trim();
    return { tema: tek, icerik: tek };
  }

  function curriculumTemaListesi(ders) {
    const gorulen = new Set();
    const temalar = [];
    curriculumBloklar(ders).forEach((bl) => {
      (bl.konular || []).forEach((kon) => {
        const bolum = curriculumKonuBol(kon.baslik);
        if (bolum.tema && !gorulen.has(bolum.tema)) {
          gorulen.add(bolum.tema);
          temalar.push(bolum.tema);
        }
      });
    });
    return temalar;
  }

  function curriculumKonular(ders, tema) {
    const satirlar = [];
    curriculumBloklar(ders).forEach((bl) => {
      (bl.konular || []).forEach((kon) => {
        const bolum = curriculumKonuBol(kon.baslik);
        if (tema && bolum.tema !== tema) return;
        satirlar.push({
          baslik: kon.baslik || "",
          konuTema: bolum.tema,
          konuIcerik: bolum.icerik,
          kaynakTema: bl.tema || "",
          ciktilar: kon.ciktilar || [],
        });
      });
    });
    return satirlar;
  }

  async function sinifListesiYukle() {
    const id = state.meta.sinifId;
    if (!id) {
      alert("Önce sınıf seçin.");
      return;
    }
    try {
      const r = await fetch(API_SINIF(id), { credentials: "same-origin" });
      const j = await r.json();
      if (!j.ok) throw new Error(j.sebep || "Liste alınamadı");
      state.ogrenciler = (j.ogrenciler || []).map((row, i) => ({
        dbId: row.id,
        sira: i + 1,
        ogrNo: row.ogr_no,
        adSoyad: row.ad_soyad,
        katilmadi: false,
      }));
      state.meta.sinifAdi = j.sinif_adi || state.meta.sinifAdi;
      state.meta.sinifMevcudu = String(j.mevcut || state.ogrenciler.length || "");
      state.meta.sinavaKatilan = String(state.ogrenciler.length || "");
      state.notlar = {};
      scheduleSave();
      renderActivePanel();
    } catch (e) {
      alert(e.message || String(e));
    }
  }

  function ogrenciSatirEkle() {
    state.ogrenciler.push({ dbId: null, sira: state.ogrenciler.length + 1, ogrNo: "", adSoyad: "", katilmadi: false });
    scheduleSave();
    renderActivePanel();
  }

  function patchOgrenci(i, k, v) {
    if (!state.ogrenciler[i]) return;
    state.ogrenciler[i][k] = v;
    scheduleSave();
  }

  function soruEkle(tur, metin, puan, meta) {
    const q = {
      id: uid("q"),
      unite: (meta && meta.unite) || "",
      konu: (meta && meta.konu) || "",
      metin: metin || "",
      puan: Math.max(0, parseFloat(puan) || 1),
    };
    state.sorular[tur].push(q);
    scheduleSave();
    renderActivePanel();
  }

  function soruSil(tur, idx) {
    const removed = state.sorular[tur][idx];
    state.sorular[tur].splice(idx, 1);
    if (removed) {
      const colId = tur[0] + "_" + removed.id;
      Object.keys(state.notlar).forEach((sk) => {
        if (state.notlar[sk]) delete state.notlar[sk][colId];
      });
    }
    scheduleSave();
    renderActivePanel();
  }

  function soruGuncelle(tur, idx, k, v) {
    const q = state.sorular[tur][idx];
    if (!q) return;
    if (k === "puan") q.puan = Math.max(0, parseFloat(v) || 0);
    else q[k] = v;
    scheduleSave();
  }

  function notHucre(sk, colId, v) {
    const bag = ensureNotlar(sk);
    if (v === "" || v == null) delete bag[colId];
    else bag[colId] = v;
    scheduleSave();
  }

    function mufredatSecenekleriDoldur() {
      if (!curriculumCache) return;
      const ders = (mfDers && mfDers.value) || "";
      const temalar = curriculumTemaListesi(ders);
      const temaVar = temalar.includes(mufredatSeciliTema);

      if (mfTema) {

            .map((tema) => `<option value="${escAttr(tema)}"${mufredatSeciliTema === tema ? " selected" : ""}>${esc(tema)}</option>`)

      }
      const konular = curriculumKonular(ders, mufredatSeciliTema);
      const konuVar = konular.some((kon) => (kon.baslik || "") === mufredatSeciliKonu);
      if (!konuVar) mufredatSeciliKonu = "";
      if (mfKonu) {
        mfKonu.innerHTML =
          `<option value="">— Konu/İçerik seçin —</option>` +
          konular
            .map((kon) => {
              const baslik = kon.baslik || "";
              const etiket = kon.konuIcerik || baslik;
              return `<option value="${escAttr(baslik)}"${mufredatSeciliKonu === baslik ? " selected" : ""}>${esc(etiket)}</option>`;
            })
            .join("");
      }
    }

    function mufredatCiz() {
      if (!curriculumCache || !mfOut) return;
      mufredatSecenekleriDoldur();
      const ders = (mfDers && mfDers.value) || "";
      const tema = mufredatSeciliTema;
      const konuBaslik = mufredatSeciliKonu;
      const flt = (mufredatFilter || "").toLowerCase().trim();
      const sat = [];
      curriculumKonular(ders, tema).forEach((kon) => {
        if (konuBaslik && (kon.baslik || "") !== konuBaslik) return;
          const kb = kon.baslik || "";
          (kon.ciktilar || []).forEach((c) => {
            const metin = (c || "").trim();
            if (!metin) return;
            const arama = [tema, kb, metin].join(" ").toLowerCase();
            if (flt && arama.indexOf(flt) === -1) return;
            sat.push({ tema, konu: kb, metin });
          });
      });
      if (!ders) {
        mfOut.innerHTML = `<div class="p-2 text-slate-500">Ders seçin.</div>`;
        return;
      }
      if (!tema) {
        mfOut.innerHTML = `<div class="p-2 text-slate-500">Konu/Tema seçin.</div>`;
        return;
      }
      if (!konuBaslik) {
        mfOut.innerHTML = `<div class="p-2 text-slate-500">Konu/İçerik Çerçevesi seçin.</div>`;
        return;
      }
      if (!sat.length) {
        mfOut.innerHTML = `<div class="p-2 text-slate-500">Sonuç yok (filtre veya seçili içerik).</div>`;
        return;
      }
      mfOut.innerHTML = sat
        .map(
          (r, i) =>
            `<div class="border-b border-slate-100 px-2 py-1.5 hover:bg-amber-50/80">
              <button type="button" class="text-left w-full" data-muf-pick="${i}">
                <span class="text-slate-800">${esc(r.metin)}</span>
              </button>
            </div>`
        )
        .join("");
      mfOut.querySelectorAll("[data-muf-pick]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const i = parseInt(btn.getAttribute("data-muf-pick"), 10);
          const row = sat[i];
          if (row) soruEkle(soruPanelTur, row.metin, 10, { unite: row.tema, konu: row.konu });
        });
      });
    }

    if (mf) {
      mf.addEventListener("click", async () => {
        try {
          await fetchCurriculum();
          const dersAdlari = Object.keys(curriculumCache.dersler || {}).sort();
          if (mfDers) {
            const selD = mfDers.value;
            const hedefDers = curriculumDersAdi(state.meta.ders);
            mfDers.innerHTML =
              `<option value="">— Ders seçin —</option>` +
              dersAdlari.map((d) => `<option value="${escAttr(d)}"${(selD || hedefDers) === d ? " selected" : ""}>${esc(d)}</option>`).join("");
          }
          mufredatSecenekleriDoldur();
          mufredatCiz();
        } catch (e) {
          alert(e.message || String(e));
        }
      });
    }
    if (mfDers) {
      mfDers.addEventListener("change", () => {
        mufredatSeciliTema = "";
        mufredatSeciliKonu = "";
        mufredatCiz();
      });
    }
    if (mfTema) {
      mfTema.addEventListener("change", () => {
        mufredatSeciliTema = mfTema.value;
        mufredatSeciliKonu = "";
        mufredatCiz();
      });
    }
    if (mfKonu) {
      mfKonu.addEventListener("change", () => {
        mufredatSeciliKonu = mfKonu.value;
        mufredatCiz();
      });
    }
    if (mfFilt) {
      mfFilt.addEventListener("input", () => {
        mufredatFilter = mfFilt.value;
        mufredatCiz();
      });
    }
    if (curriculumCache && mfDers) {
      const dersAdlari = Object.keys(curriculumCache.dersler || {}).sort();
      const hedefDers = curriculumDersAdi(state.meta.ders);
      mfDers.innerHTML =
        `<option value="">— Ders seçin —</option>` +
        dersAdlari.map((d) => `<option value="${escAttr(d)}"${hedefDers === d ? " selected" : ""}>${esc(d)}</option>`).join("");
      mufredatSecenekleriDoldur();
      mufredatCiz();
    }
  }

  function renderNot() {
    const el = document.getElementById("panel-not");
    const fq = flatQuestions();
    const head = fq
      .map((c) => {
        const tam = soruAnalizMetni(c.q);
        const k = kisaMetin(tam, 18);
        return `<th class="p-1 border border-slate-200 bg-slate-50 font-bold text-[10px] align-bottom whitespace-nowrap" title="${esc(tam)}">${
          esc(c.tur[0].toUpperCase()) + (c.idx + 1)
        }<br/><span class="font-normal text-slate-500">${esc(k)}</span></th>`;
      })
      .join("");
    const body = state.ogrenciler
      .map((o) => {
        if (o.katilmadi) {
          return `<tr class="bg-slate-50"><td class="p-1 border border-slate-100 text-[10px]">${esc(o.ogrNo)}</td><td class="p-1 border border-slate-100 text-[10px]">${esc(
            o.adSoyad
          )}</td>${fq.map(() => `<td class="p-1 border border-slate-100 text-center text-slate-400">—</td>`).join("")}</tr>`;
        }
        const sk = studentKey(o);
        const hucre = fq
          .map((c) => {
            const v = (state.notlar[sk] && state.notlar[sk][c.colId]) ?? "";
            return `<td class="p-0 border border-slate-100"><input class="w-full min-w-[3rem] text-center text-[11px] py-1 border-0" data-n-sk="${escAttr(sk)}" data-n-col="${escAttr(
              c.colId
            )}" value="${escAttr(v)}"/></td>`;
          })
          .join("");
        return `<tr><td class="p-1 border border-slate-100 text-[10px] font-mono">${esc(o.ogrNo)}</td><td class="p-1 border border-slate-100 text-[10px] whitespace-nowrap">${esc(
          o.adSoyad
        )}</td>${hucre}</tr>`;
      })
      .join("");
    el.innerHTML = `
      <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm space-y-2">
        <h2 class="text-sm font-black text-slate-800">Öğrenci notları</h2>
        <p class="text-xs text-slate-600">Her hücre sorunun tam puanına kadar değer alabilir. Katılmayanlar (G) için giriş kapalıdır.</p>
        <div class="overflow-x-auto border border-slate-200 rounded-xl max-h-[70vh]">
          <table class="text-xs border-collapse min-w-max">
            <thead class="sticky top-0 z-10"><tr class="bg-slate-100 font-bold text-slate-700">
              <th class="p-1 border border-slate-200 w-12">No</th><th class="p-1 border border-slate-200 w-36">Öğrenci</th>${head}
            </tr></thead>
            <tbody>${body || `<tr><td colspan="${2 + fq.length}" class="p-4 text-center text-slate-500">Öğrenci veya öğrenme çıktısı yok.</td></tr>`}</tbody>
          </table>
        </div>
      </div>`;
    el.querySelectorAll("input[data-n-sk]").forEach((inp) => {
      const upd = () => notHucre(inp.getAttribute("data-n-sk"), inp.getAttribute("data-n-col"), inp.value);
      inp.addEventListener("change", upd);
      inp.addEventListener("blur", upd);
    });
  }

  function renderRapor() {
    const el = document.getElementById("panel-rapor");
    const html = buildFormalRaporHtml();
    const blobUrl = URL.createObjectURL(new Blob([html], { type: "text/html;charset=utf-8" }));
    el.innerHTML = `
      <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm space-y-3">
        <div class="flex flex-wrap gap-2 items-center justify-between">
          <h2 class="text-sm font-black text-slate-800">Yazdırılabilir rapor</h2>
          <div class="flex flex-wrap gap-2">
            <button type="button" id="btn-print-rapor" class="rounded-xl bg-amber-700 text-white text-xs font-bold px-3 py-2">Yazdır / PDF</button>
            <a id="btn-rapor-indir" class="rounded-xl border border-slate-300 text-xs font-bold px-3 py-2 inline-flex items-center" href="${blobUrl}" download="sinav-analiz-raporu.html">HTML indir</a>
          </div>
        </div>
        <iframe id="rapor-ifr" class="w-full min-h-[520px] border border-slate-200 rounded-xl bg-white" title="Önizleme"></iframe>
      </div>`;
    const ifr = el.querySelector("#rapor-ifr");
    if (ifr) ifr.srcdoc = html;
    const pr = el.querySelector("#btn-print-rapor");
    if (pr) {
      pr.addEventListener("click", () => {
        const w = window.open("", "_blank");
        if (w) {
          w.document.write(html);
          w.document.close();
          w.focus();
          w.print();
        }
      });
    }
  }

  function renderYedek() {
    const el = document.getElementById("panel-yedek");
    el.innerHTML = `
      <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm space-y-3">
        <h2 class="text-sm font-black text-slate-800">Yedek / geri yükle</h2>
        <p class="text-xs text-slate-600">Veriler tarayıcıda (localStorage) saklanır. Aşağıdaki JSON’u kopyalayarak yedekleyebilirsiniz.</p>
        <textarea id="yedek-ta" class="w-full min-h-[200px] rounded-xl border border-slate-300 p-2 text-xs font-mono"></textarea>
        <div class="flex flex-wrap gap-2">
          <button type="button" id="btn-yedek-copy" class="rounded-xl bg-slate-800 text-white text-xs font-bold px-3 py-2">Panoya kopyala</button>
          <button type="button" id="btn-yedek-apply" class="rounded-xl border border-amber-600 text-amber-900 text-xs font-bold px-3 py-2">Metinden yükle</button>
          <button type="button" id="yedek-reset" class="rounded-xl border border-red-200 text-red-700 text-xs font-bold px-3 py-2">Sıfırla</button>
        </div>
      </div>`;
    const ta = el.querySelector("#yedek-ta");
    if (ta) ta.value = JSON.stringify(state, null, 2);
    el.querySelector("#btn-yedek-copy")?.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(ta.value);
        alert("Kopyalandı.");
      } catch (e) {
        alert("Panoya kopyalanamadı.");
      }
    });
    el.querySelector("#btn-yedek-apply")?.addEventListener("click", () => {
      try {
        const o = JSON.parse(ta.value);
        if (!o || typeof o !== "object") throw new Error("Geçersiz");
        state = Object.assign(defaultState(), o);
        mergeMetaDefaults();
        ["yazili", "dinleme", "konusma"].forEach((k) => {
          if (!Array.isArray(state.sorular[k])) state.sorular[k] = [];
        });
        if (!state.notlar || typeof state.notlar !== "object") state.notlar = {};
        state.ogrenciler.forEach((ogr) => {
          if (ogr.katilmadi == null) ogr.katilmadi = false;
        });
        scheduleSave();
        renderTabs();
        showPanel();
        renderActivePanel();
        alert("Yüklendi.");
      } catch (e) {
        alert("JSON hatalı: " + (e.message || e));
      }
    });
    el.querySelector("#yedek-reset")?.addEventListener("click", () => {
      if (!confirm("Tüm sınav analizi verisi silinsin mi?")) return;
      localStorage.removeItem(LS_KEY);
      state = defaultState();
      curriculumCache = null;
      renderTabs();
      showPanel();
      renderActivePanel();
    });
  }

  function renderActivePanel() {
    if (activeTab === "bilgi") renderBilgi();
    else if (activeTab === "tur") renderTur();
    else if (activeTab === "sinif") renderSinif();
    else if (activeTab === "soru") renderSoru();
    else if (activeTab === "not") renderNot();
    else if (activeTab === "rapor") renderRapor();
    else if (activeTab === "yedek") renderYedek();
  }

  loadState();
  renderTabs();
  showPanel();
  renderActivePanel();
  if (state.meta.sinifId && state.ogrenciler.length === 0) {
    sinifListesiYukle();
  }
})();
</script>
{% endblock %}
