<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voleybol Taktik - {{ sinif_adi }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .court-zone{min-height:120px}
    .player-chip{touch-action:none;user-select:none}
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-white">
<header class="border-b border-slate-800 bg-slate-900 px-4 py-3">
  <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3">
    <div>
      <div class="text-xs font-black uppercase tracking-wider text-sky-300">{{ sinif_adi }}</div>
      <h1 class="text-xl font-black">Voleybol Taktik Ekrani</h1>
    </div>
    <div class="flex flex-wrap gap-2">
      <a href="{{ ana_menu_url }}" class="rounded-lg bg-slate-700 px-3 py-2 text-xs font-black">Mac paneli</a>
      <button onclick="otomatikDiz()" class="rounded-lg bg-sky-700 px-3 py-2 text-xs font-black">6'li diz</button>
      <button onclick="temizle()" class="rounded-lg bg-rose-700 px-3 py-2 text-xs font-black">Temizle</button>
      <button onclick="kaydet()" class="rounded-lg bg-emerald-700 px-3 py-2 text-xs font-black">Kaydet</button>
    </div>
  </div>
</header>

<main class="mx-auto grid max-w-6xl gap-4 px-4 py-5 lg:grid-cols-[1fr_260px]">
  <section class="space-y-3">
    <div id="durum" class="rounded-lg border border-sky-500/30 bg-sky-500/10 px-4 py-2 text-sm text-sky-100">
      Oyuncuyu sagdan sahaya surukle veya 6'li diz butonunu kullan.
    </div>
    <div class="rounded-2xl border border-sky-300/40 bg-sky-900/30 p-3">
      <div class="grid grid-cols-2 gap-2">
        {% for no, ad in [(4,'Sol on'),(3,'Orta on'),(2,'Sag on'),(5,'Sol arka'),(6,'Orta arka'),(1,'Sag arka')] %}
        <div class="court-zone rounded-xl border border-white/20 bg-slate-950/65 p-3"
             data-zone="{{ no }}" ondragover="event.preventDefault()" ondrop="dropZone(event, '{{ no }}')">
          <div class="mb-2 flex items-center justify-between gap-2 text-xs text-sky-200">
            <span class="font-black">{{ no }}</span>
            <span>{{ ad }}</span>
          </div>
          <div id="zone-{{ no }}" class="min-h-[70px] space-y-2"></div>
        </div>
        {% endfor %}
      </div>
    </div>
  </section>

  <aside class="rounded-2xl border border-slate-800 bg-slate-900 p-3">
    <div class="mb-2 text-sm font-black text-slate-200">Kadro</div>
    <div id="kadro" class="max-h-[70vh] space-y-2 overflow-y-auto"></div>
  </aside>
</main>

<script>
const KADRO = {{ kadro|tojson }};
const KAYIT = {{ kayit|tojson }};
const KAYDET_URL = {{ kaydet_url|tojson }};
const ZONLAR = ['4','3','2','5','6','1'];
let yerlesim = {};
let roller = {};

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

function oyuncuAd(id) {
  const o = KADRO.find(x => String(x.id) === String(id));
  return o ? o.ad_soyad : 'Oyuncu';
}

function kadroRender() {
  const kullanilan = new Set(Object.values(yerlesim).map(String));
  document.getElementById('kadro').innerHTML = KADRO.map(o => `
    <div draggable="${kullanilan.has(String(o.id)) ? 'false' : 'true'}"
         ondragstart="dragStart(event, '${o.id}')"
         class="player-chip rounded-lg border ${kullanilan.has(String(o.id)) ? 'border-slate-800 bg-slate-950/50 text-slate-500' : 'border-slate-700 bg-slate-950 text-white'} px-3 py-2 text-sm">
      <div class="font-black">${escapeHtml(o.ad_soyad)}</div>
      <div class="text-xs text-slate-500">No ${escapeHtml(o.ogr_no || '')}</div>
    </div>
  `).join('');
}

function sahaRender() {
  ZONLAR.forEach(z => {
    const oid = yerlesim[z];
    const box = document.getElementById('zone-' + z);
    if (!oid) {
      box.innerHTML = '<div class="rounded-lg border border-dashed border-white/10 px-3 py-4 text-center text-xs text-slate-500">Bos</div>';
      return;
    }
    const rol = roller[z] || '';
    box.innerHTML = `
      <div class="rounded-lg border border-sky-400/40 bg-sky-600/20 p-2">
        <div class="flex items-start justify-between gap-2">
          <div class="min-w-0">
            <div class="truncate font-black">${escapeHtml(oyuncuAd(oid))}</div>
            <input value="${escapeHtml(rol)}" oninput="roller['${z}']=this.value"
                   class="mt-2 w-full rounded-md border border-slate-700 bg-slate-950 px-2 py-1 text-xs"
                   placeholder="Pasor, smaçor, libero...">
          </div>
          <button onclick="kaldir('${z}')" class="rounded bg-rose-700 px-2 py-1 text-xs font-black">x</button>
        </div>
      </div>`;
  });
  kadroRender();
}

function dragStart(ev, id) {
  ev.dataTransfer.setData('text/plain', id);
}

function dropZone(ev, zone) {
  ev.preventDefault();
  const id = ev.dataTransfer.getData('text/plain');
  Object.keys(yerlesim).forEach(z => {
    if (String(yerlesim[z]) === String(id)) delete yerlesim[z];
  });
  yerlesim[zone] = id;
  sahaRender();
}

function kaldir(zone) {
  delete yerlesim[zone];
  delete roller[zone];
  sahaRender();
}

function temizle() {
  yerlesim = {};
  roller = {};
  sahaRender();
}

function otomatikDiz() {
  temizle();
  KADRO.slice(0, 6).forEach((o, i) => yerlesim[ZONLAR[i]] = String(o.id));
  roller = {'4':'Smaçor','3':'Orta oyuncu','2':'Pasor çaprazi','5':'Smaçor','6':'Libero','1':'Pasor'};
  sahaRender();
}

async function kaydet() {
  const veri = {spor:'voleybol', yerlesim, roller};
  const durum = document.getElementById('durum');
  durum.textContent = 'Kaydediliyor...';
  try {
    const res = await fetch(KAYDET_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(veri),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.sebep || 'Kaydedilemedi');
    durum.className = 'rounded-lg border border-emerald-500/30 bg-emerald-500/10 px-4 py-2 text-sm text-emerald-100';
    durum.textContent = 'Voleybol taktigi kaydedildi.';
  } catch (e) {
    durum.className = 'rounded-lg border border-rose-500/30 bg-rose-500/10 px-4 py-2 text-sm text-rose-100';
    durum.textContent = e.message;
  }
}

if (KAYIT && KAYIT.yerlesim) yerlesim = {...KAYIT.yerlesim};
if (KAYIT && KAYIT.roller) roller = {...KAYIT.roller};
sahaRender();
</script>
</body>
</html>
