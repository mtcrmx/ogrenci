services:
  - type: web
    name: ogrenci-takip
    runtime: python
    buildCommand: pip install flask openpyxl gunicorn
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OGR_TAKIP_DATA_DIR
        value: /data
    disk:
      name: veritabani
      mountPath: /data
      sizeGB: 1
